<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <link rel="icon" href="https://suuuuuhaooooo.github.io/-/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="https://suuuuuhaooooo.github.io/-/favicon.png">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蘇昊數理｜試務中心</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script>
    window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                processEscapes: true 
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        
        :root { --primary: #8e9775; --dark: #5b6348; --bg: #f8f8f6; --white: #ffffff; }
        
        body { 
            font-family: "Noto Serif TC", serif; 
            background-color: var(--bg); 
            margin: 0; padding: 20px; color: #333; 
            user-select: none; -webkit-user-select: none;
            overscroll-behavior-y: none;
        }
        
        #loading-screen { display: flex; justify-content: center; align-items: center; height: 100vh; font-size: 18px; color: var(--primary); font-weight: 700; letter-spacing: 2px; }

        .container-ui { 
            display: none; max-width: 800px; margin: 0 auto; background: var(--white);
            padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 6px solid var(--primary);
        }

        h2 { color: var(--dark); border-left: 5px solid var(--primary); padding-left: 15px; margin-top: 0; }
        .back-btn { display: inline-block; margin-bottom: 20px; color: #888; text-decoration: none; font-size: 14px; transition: 0.2s; cursor: pointer; }
        .back-btn:hover { color: var(--primary); font-weight: 700; }

        .exam-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 20px; }
        .exam-card { border: 1px solid #eee; padding: 20px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; background: #fafafa; transition: 0.3s; }
        .exam-card:hover { border-color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .exam-info h3 { margin: 0 0 5px 0; font-size: 16px; color: var(--dark); }
        .exam-info p { margin: 0; font-size: 12px; color: #888; }
        
        .exam-status-btn { padding: 10px 18px; border-radius: 4px; font-weight: 700; font-size: 13px; cursor: pointer; border: none; transition: 0.2s; }
        .btn-start { background: var(--primary); color: white; }
        .btn-start:hover { background: var(--dark); }
        
        .status-badge { display: inline-block; padding: 10px 15px; background: #e0e0e0; color: #777; border-radius: 4px; font-weight: 700; font-size: 13px; margin-right: 8px; cursor: not-allowed; }
        
        .btn-review { background: white; color: var(--primary); border: 1px solid var(--primary); }
        .btn-review:hover { background: var(--primary); color: white; }

        .quiz-header-container { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px dashed #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .quiz-header { font-size: 15px; color: #888; font-weight: 700; letter-spacing: 1px; margin: 0; }
        .timer-display { font-size: 18px; color: #c0392b; font-weight: 700; background: #fdf2f0; padding: 5px 12px; border-radius: 4px; border: 1px solid #fadbd8; }
        
        .question-text { font-size: 18px; color: #333; line-height: 1.6; margin-bottom: 25px; font-weight: 700; }
        .option-btn { display: block; width: 100%; text-align: left; padding: 15px 20px; margin-bottom: 12px; background: #fafafa; border: 2px solid #eee; border-radius: 6px; font-size: 16px; color: #555; cursor: pointer; transition: 0.2s; box-sizing: border-box; font-family: inherit; }
        .option-btn:hover { background: #f0f3ef; border-color: #d1d8c8; }
        .option-btn.selected { background: #eef1ec; border-color: var(--primary); color: var(--dark); font-weight: 700; }
        
        .main-btn { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; cursor: pointer; letter-spacing: 2px; font-weight: 700; transition: 0.3s; margin-top: 20px; border-radius: 4px; font-size: 16px; }
        .main-btn:hover { background: var(--dark); }
        .main-btn:disabled { background: #ccc; cursor: not-allowed; }

        #score-display { text-align: center; font-size: 36px; color: var(--dark); font-weight: 700; margin: 20px 0; padding: 20px; background: #fafafa; border-radius: 8px; }
        .review-card { background: white; border: 1px solid #eee; padding: 20px; margin-bottom: 20px; border-radius: 6px; }
        .review-q { font-weight: 700; margin-bottom: 10px; font-size: 16px; }
        .review-ans { font-size: 14px; margin-bottom: 5px; }
        .review-correct { color: #27ae60; font-weight: 700; }
        .review-wrong { color: #c0392b; font-weight: 700; }
        .review-exp { margin-top: 12px; padding: 12px; background: #f9f9f9; border-left: 4px solid var(--primary); font-size: 13px; color: #666; line-height: 1.5; }

        /* 學習儀表板樣式 */
        .dashboard-btn { background: #fff; color: var(--dark); border: 2px solid #eee; padding: 15px; border-radius: 8px; font-weight: 700; width: 100%; cursor: pointer; transition: 0.3s; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .dashboard-btn:hover { border-color: var(--primary); color: var(--primary); box-shadow: 0 4px 10px rgba(142,151,117,0.15); transform: translateY(-2px); }
        
        .clean-card { background: #fff; border: 1px solid #f0f0f0; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); padding: 25px; margin-bottom: 20px; transition: 0.2s; }
        .clean-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.08); border-color: #e8e8e8; }
        
        .tag-pill { display: inline-block; background: #f0f3ef; color: var(--dark); padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 15px; }
        
        .chart-control-wrap { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .modern-select { padding: 6px 12px; border-radius: 20px; border: 1px solid #ddd; outline: none; background: #fafafa; font-size: 13px; color: #555; cursor: pointer; font-family: inherit; }
    </style>
</head>
<body>

    <script>
        document.addEventListener('contextmenu', function(event) { event.preventDefault(); alert("版權所有，翻印必究！"); });
        let completedRecords = {}; 
    </script>

    <div id="loading-screen">系統確認授權中，載入測驗...</div>

    <div id="exam-list-ui" class="container-ui">
        <a href="classroom.html" class="back-btn">← 返回雲端教室</a>
        <h2>試務中心</h2>
        
        <button class="dashboard-btn" onclick="showDashboard()">
            <span style="font-size: 20px;"></span> 進入學習分析與錯題本
        </button>

        <div style="background: #fdf2f0; border-left: 4px solid #e74c3c; padding: 15px; margin-bottom: 25px; border-radius: 4px;">
            <strong style="color: #c0392b; font-size: 15px;">考前須知：</strong>
            <ul style="color: #c0392b; font-size: 13px; margin: 8px 0 0; padding-left: 20px; line-height: 1.6;">
                <li>點選「開始測驗」即視同正式進場，無法取消或重考。</li>
                <li>本系統採取「單向作答」模式。點選「確認並下一題」後，將無法返回修改前一題答案。</li>
                <li>中途嚴禁「重新整理」或「離開網頁」，否則系統將強制收卷。</li>
                <li>若違規跳出，系統將強制收卷，未作答題目一律以 0 分計算。</li>
            </ul>
        </div>
        <div id="exam-grid" class="exam-grid"></div>
    </div>

    <div id="test-ui" class="container-ui">
        <span class="back-btn" onclick="abandonExam()">← 放棄本次作答，提早交卷</span>
        <h2 id="active-exam-title">測驗載入中...</h2>
        <div id="quiz-container">
            <div class="quiz-header-container">
                <div class="quiz-header" id="quiz-progress">題目 1 / X</div>
                <div class="timer-display" id="timer-display">時間還剩 30:00</div>
            </div>
            <div class="question-text" id="question-text">載入題目中...</div>
            <div id="options-container"></div>
            <button id="next-btn" class="main-btn" onclick="nextQuestion()" disabled>確認並下一題</button>
        </div>
    </div>

    <div id="result-ui" class="container-ui">
        <h3 id="result-title" style="text-align: center; color: var(--dark); margin-bottom: 0;">測驗結算</h3>
        <div id="score-display"></div>
        <h4 style="border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 30px;">錯題與未作答檢討</h4>
        <div id="review-container"></div>
        <button class="main-btn" onclick="showExamList()">完成並返回試務列表</button>
    </div>

    <div id="dashboard-ui" class="container-ui" style="background: #fdfdfc;">
        <span class="back-btn" onclick="showExamList()">← 返回試務列表</span>
        <h2>學習分析儀表板</h2>
        
        <div style="background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 30px; border: 1px solid #f0f0f0;">
            <div class="chart-control-wrap">
                <h3 style="margin: 0; color: var(--dark); font-size: 15px;">數據視覺化</h3>
                <select id="chart-type-selector" class="modern-select" onchange="renderChart(this.value)">
                    <option value="line">折線圖 (成績走勢)</option>
                    <option value="radar">雷達圖 (能力分佈)</option>
                </select>
            </div>
            <canvas id="scoreChart" style="max-height: 280px;"></canvas>
            <div id="chart-empty-msg" style="text-align: center; color: #aaa; font-size: 13px; display: none; padding: 30px 0;">尚無足夠的測驗數據繪製圖表</div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 style="margin: 0; color: var(--dark); font-size: 16px;">我的錯題本</h3>
            <select id="error-filter" class="modern-select" onchange="renderErrorBook(this.value)">
                <option value="all">顯示全部單元</option>
            </select>
        </div>
        
        <div id="error-book-summary" style="margin-bottom: 15px; font-size: 13px; color: #888; text-align: right;"></div>
        <div id="error-book-container"></div>
    </div>

    <script>
        document.addEventListener('keydown', function(event) {
            if (event.keyCode === 123 || // F12
               (event.ctrlKey && event.shiftKey && (event.keyCode === 73 || event.keyCode === 74)) || // Ctrl+Shift+I 或 J
               (event.ctrlKey && event.keyCode === 85)) { // Ctrl+U (檢視網頁原始碼)
                event.preventDefault();
                alert("【警告】\n\n嚴禁開啟開發者工具！系統已記錄異常行為。");
                logout(); 
            }
        });
        setInterval(function() {
            const before = new Date().getTime();
            debugger; // 正常情況下這行會瞬間閃過，但如果 Console 開著，瀏覽器會暫停在這裡
            const after = new Date().getTime();
            if (after - before > 100) {
                // 偵測到停頓，代表 Console 被打開了
                logout(); 
            }
        }, 1000);
        // -----------------------------------------
        // 切換視窗與 APP 偵測
        // -----------------------------------------
        let cheatWarnings = 0;    // 違規次數
        let isExamActive = false; // 是否正在考試中

        // 監聽網頁可見度變化
        document.addEventListener("visibilitychange", () => {
            // 如果正在考試，且畫面被隱藏（切換分頁、縮小、開其他APP）
            if (isExamActive && document.hidden) {
                cheatWarnings++;
                
                if (cheatWarnings >= 3) {
                    alert("【系統通知】\n\n系統偵測到您已切換視窗或離開測驗畫面達 3 次！\n已視同違規作弊，系統將立刻強制交卷。");
                    finishAndShowResults(); // 直接觸發交卷
                } else {
                    alert(`【警告】\n\n考試期間請勿切換視窗、開啟其他網頁或 APP！\n\n您目前已違規 ${cheatWarnings} 次。\n若達 3 次，系統將直接強制收卷。`);
                }
            }
        });
        // 1. Firebase 權限驗證
        const firebaseConfig = {
            apiKey: "AIzaSyALkTnkYY3JZLCTyajahpi4IZKmFX9USdw",
            authDomain: "su-hao-classroom.firebaseapp.com",
            projectId: "su-hao-classroom",
            storageBucket: "su-hao-classroom.firebasestorage.app",
            messagingSenderId: "764168135846",
            appId: "1:764168135846:web:f2923a5f4952fa1ca64067"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwxFfufe0b7eJpDxSmLgnbVvlq1itLvoD6ZCpvDJKtJg7ChcWn7lpf9LgZqQ4ZsThJiXQ/exec";
        
        let currentUserUid = null;
        let studentPersonalExams = []; 
        let timerInterval = null; 
        let timeRemaining = 0;    

        // 閒置登出機制
        let idleTimer;
        let isAutoLoggingOut = false; 

        function logout() {
            isAutoLoggingOut = true; 
            const user = auth.currentUser;
            if (user) { db.ref('presence/' + user.uid).remove(); }
            auth.signOut().then(() => {
                localStorage.clear();
                window.location.replace("classroom.html");
            });
        }

        function resetIdleTimer() {
            clearTimeout(idleTimer);
            if (auth.currentUser) {
                idleTimer = setTimeout(() => {
                    alert("由於您已長時間未操作，系統已自動將您安全登出。");
                    logout();
                }, 180000);
            }
        }
        window.onmousemove = window.onkeypress = window.ontouchstart = window.onclick = resetIdleTimer;

        // 權限驗證與資料載入
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUserUid = user.uid;
                resetIdleTimer();
                try {
                    const snap = await db.ref('exam_records/' + currentUserUid).once('value');
                    completedRecords = snap.val() || {}; 
                    const [studentRes, examRes] = await Promise.all([
                        fetch(SCRIPT_URL + "?token=SuHaoClassroom2026_SecureKey"),
                        fetch(SCRIPT_URL + "?token=SuHaoClassroom2026_SecureKey&action=getExams")
                    ]);
                    const studentDataArray = await studentRes.json();
                    const allExamsCatalog = await examRes.json();
                    const myData = studentDataArray.find(i => i.uid === user.uid);
                    if (myData && myData.examIds && myData.examIds.trim() !== "") {
                        const assignedIds = myData.examIds.split(',').map(id => id.trim());
                        studentPersonalExams = allExamsCatalog.filter(exam => assignedIds.includes(exam.id));
                    } else {
                        studentPersonalExams = []; 
                    }
                    document.getElementById('loading-screen').style.display = 'none';
                    showExamList(); 
                } catch (e) {
                    console.error("系統讀取失敗：", e);
                    alert("資料庫連線異常，請重新整理頁面。");
                }
            } else {
                alert("未授權的存取！請先登入系統才能進行測驗。");
                window.location.replace("classroom.html"); 
            }
        });

        window.addEventListener('beforeunload', function (e) {
            if (document.getElementById('test-ui').style.display === 'block' && !isAutoLoggingOut) {
                e.preventDefault(); e.returnValue = ''; return '';
            }
        });

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function hideAllUI() {
            document.getElementById('exam-list-ui').style.display = 'none';
            document.getElementById('test-ui').style.display = 'none';
            document.getElementById('result-ui').style.display = 'none';
            document.getElementById('dashboard-ui').style.display = 'none';
            clearInterval(timerInterval); 
        }

        function showExamList() {
            hideAllUI();
            document.getElementById('exam-list-ui').style.display = 'block';
            const grid = document.getElementById('exam-grid');
            grid.innerHTML = "";
            if (studentPersonalExams.length === 0) {
                grid.innerHTML = '<div style="text-align: center; color: #bbb; padding: 40px 0; border: 1px dashed #ccc; border-radius: 6px;">目前沒有待完成的測驗任務。</div>';
                return;
            }
            studentPersonalExams.forEach(exam => {
                const isDone = completedRecords[exam.id]; 
                const card = document.createElement('div');
                card.className = 'exam-card';
                let btnHtml = isDone 
                    ? `<div style="display: flex; align-items: center;"><span class="status-badge">✔ 已完成 (${isDone.score}分)</span><button class="exam-status-btn btn-review" onclick="viewReview('${exam.id}')">單次檢討</button></div>`
                    : `<button class="exam-status-btn btn-start" onclick="startExam('${exam.id}')">▶ 開始測驗</button>`;
                card.innerHTML = `<div class="exam-info"><h3>${exam.title}</h3><p>${exam.desc}</p></div><div>${btnHtml}</div>`;
                grid.appendChild(card);
            });
        }

        let currentExam = null;
        let currentQuestionIndex = 0;
        let userAnswers = [];

        function startExam(examId) {
            const isConfirmed = confirm("系統警告：\n\n點擊「確定」後將立即開始計時！\n\n測驗中途若「重新整理」或「離開網頁」，系統將直接強制收卷結算，無法重考。\n\n您確認已經準備好，要開始測驗了嗎？");
            if (!isConfirmed) return;
            const originalExam = studentPersonalExams.find(e => e.id === examId);
            currentExam = JSON.parse(JSON.stringify(originalExam)); 
            currentExam.questions = shuffleArray(currentExam.questions);
            currentQuestionIndex = 0;
            userAnswers = new Array(currentExam.questions.length).fill(null);
            
            db.ref('exam_records/' + currentUserUid + '/' + examId).update({ score: 0, date: new Date().toISOString() });
            completedRecords[examId] = { score: 0 };
            hideAllUI();
            document.getElementById('test-ui').style.display = 'block';
            document.getElementById('active-exam-title').innerText = currentExam.title;
            timeRemaining = 1800; updateTimerDisplay();
            clearInterval(timerInterval);
            cheatWarnings = 0;
            isExamActive = true;
            timerInterval = setInterval(() => {
                timeRemaining--; updateTimerDisplay();
                if (timeRemaining <= 0) { clearInterval(timerInterval); alert("測驗時間到！系統即將自動為您交卷結算。"); finishAndShowResults(); }
            }, 1000);
            renderQuestion();
        }

        function viewReview(examId) {
            const exam = studentPersonalExams.find(e => e.id === examId);
            const record = completedRecords[examId];
            hideAllUI();
            document.getElementById('result-ui').style.display = 'block';
            document.getElementById('result-title').innerText = `回顧測驗：${exam.title}`;
            const scoreEl = document.getElementById('score-display');
            scoreEl.innerText = `${record.score} 分`;
            scoreEl.style.color = record.score >= 60 ? "#27ae60" : "#c0392b";
            
            const reviewContainer = document.getElementById('review-container');
            reviewContainer.innerHTML = "";
            
            if (record && record.details) {
                record.details.forEach((detail, index) => {
                    const originalQ = exam.questions.find(q => q.question === detail.originalQuestion) || {};
                    const currentExp = originalQ.exp || originalQ.explanation || "無解析資料";
                    const statusHtml = detail.isCorrect 
                        ? `<span class="review-correct">✔ 答對了！</span>` 
                        : `<span class="review-wrong">✘ 答錯了 (你的答案：${detail.userPick})</span>`;

                    reviewContainer.innerHTML += `
                        <div class="review-card">
                            <div class="review-q">Q${index + 1}. ${detail.originalQuestion}</div>
                            <div class="review-ans">正確答案：${detail.correctAnswer}</div>
                            <div class="review-ans">${statusHtml}</div>
                            <div class="review-exp"><strong>解析：</strong><br>${currentExp}</div>
                        </div>`;
                });
            } else {
                reviewContainer.innerHTML = "<div style='text-align:center; color:#888; padding: 20px;'>此為早期測驗紀錄，無詳細作答資料。</div>";
            }

            if (window.MathJax) { setTimeout(() => { MathJax.typesetPromise([reviewContainer]); }, 150); }
        }

        function updateTimerDisplay() {
            const m = Math.floor(timeRemaining / 60); const s = timeRemaining % 60;
            document.getElementById('timer-display').innerText = `時間還剩 ${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function renderQuestion() {
            const qData = currentExam.questions[currentQuestionIndex];
            document.getElementById('quiz-progress').innerText = `題目 ${currentQuestionIndex + 1} / ${currentExam.questions.length}`;
            document.getElementById('question-text').innerHTML = qData.question;
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = ""; 
            qData.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `${String.fromCharCode(65 + index)}. ${opt}`;
                btn.onclick = () => selectOption(index);
                if (userAnswers[currentQuestionIndex] === index) btn.classList.add('selected');
                optionsContainer.appendChild(btn);
            });
            const nextBtn = document.getElementById('next-btn');
            nextBtn.disabled = userAnswers[currentQuestionIndex] === null;
            nextBtn.innerText = currentQuestionIndex === currentExam.questions.length - 1 ? "交卷並看成績" : "確認並下一題";
            if (window.MathJax) { setTimeout(() => { MathJax.typesetPromise(); }, 100); }
        }

        function selectOption(index) {
            userAnswers[currentQuestionIndex] = index; 
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => btn.classList.remove('selected'));
            buttons[index].classList.add('selected'); 
            document.getElementById('next-btn').disabled = false; 
            
            let tempCorrect = 0;
            currentExam.questions.forEach((q, i) => { if (userAnswers[i] === q.correctAnswer) tempCorrect++; });
            const currentScore = Math.round((tempCorrect / currentExam.questions.length) * 100);
            db.ref('exam_records/' + currentUserUid + '/' + currentExam.id).update({ score: currentScore });
            completedRecords[currentExam.id].score = currentScore;
        }

        function nextQuestion() {
            if (currentQuestionIndex < currentExam.questions.length - 1) {
                currentQuestionIndex++; renderQuestion();
            } else { finishAndShowResults(); }
        }

        function abandonExam() {
            if (confirm("警告：現在離開測驗，未作答的題目將以 0 分計算，且無法重新測驗！\n\n確定要強制交卷嗎？")) { finishAndShowResults(); }
        }

        function finishAndShowResults() {
            isExamActive = false;
            if (timerInterval) clearInterval(timerInterval);
            hideAllUI(); 
            document.getElementById('result-ui').style.display = 'block';
            document.getElementById('result-title').innerText = "測驗結算";
            let correctCount = 0; let detailedResults = []; 
            const reviewContainer = document.getElementById('review-container');
            reviewContainer.innerHTML = "";

            currentExam.questions.forEach((q, index) => {
                const isCorrect = userAnswers[index] === q.correctAnswer;
                if (isCorrect) correctCount++;
                detailedResults.push({
                    originalQuestion: q.question,
                    userPick: userAnswers[index] !== null ? q.options[userAnswers[index]] : "未作答",
                    isCorrect: isCorrect,
                    correctAnswer: q.options[q.correctAnswer]
                });

                const userAnswerText = userAnswers[index] !== null ? q.options[userAnswers[index]] : "未作答";
                const statusHtml = isCorrect ? `<span class="review-correct">✔ 答對了！</span>` : `<span class="review-wrong">✘ 答錯了 (你的答案：${userAnswerText})</span>`;

                reviewContainer.innerHTML += `
                    <div class="review-card">
                        <div class="review-q">Q${index + 1}. ${q.question}</div>
                        <div class="review-ans">正確答案：${q.options[q.correctAnswer]}</div>
                        <div class="review-ans">${statusHtml}</div>
                        <div class="review-exp"><strong>解析：</strong><br>${q.explanation || '無解析'}</div>
                    </div>`;
            }); 

            const finalScore = Math.round((correctCount / currentExam.questions.length) * 100);
            const recordData = { score: finalScore, date: new Date().toISOString(), details: detailedResults };
            completedRecords[currentExam.id] = recordData;
            db.ref('exam_records/' + currentUserUid + '/' + currentExam.id).set(recordData);

            const studentName = localStorage.getItem('studentName') || "雲端同學";
            const formData = new URLSearchParams();
            formData.append("token", "SuHaoClassroom2026_SecureKey");
            formData.append("action", "submitExam");
            formData.append("email", auth.currentUser.email);
            formData.append("name", studentName);
            formData.append("examTitle", currentExam.title);
            formData.append("score", finalScore);
            formData.append("details", JSON.stringify(detailedResults));

            fetch(SCRIPT_URL, { method: "POST", body: formData.toString(), mode: 'no-cors' })
            .catch(err => console.error("發送報錯：", err));
        
            const scoreEl = document.getElementById('score-display');
            scoreEl.innerText = `${finalScore} 分`;
            if (finalScore === 100) { 
                scoreEl.style.color = "#27ae60"; scoreEl.innerText += " (滿分！太厲害了！)"; 
            } else if (finalScore >= 60) { 
                scoreEl.style.color = "#d35400"; 
            } else { 
                scoreEl.style.color = "#c0392b"; scoreEl.innerText += " (要再加油複習喔！)";
            }

            if (window.MathJax) { setTimeout(() => { MathJax.typesetPromise([reviewContainer]); }, 100); }
        }

        // -----------------------------------------
        // 學習儀表板
        // -----------------------------------------
        let scoreChartInstance = null;

        function showDashboard() {
            hideAllUI();
            document.getElementById('dashboard-ui').style.display = 'block';
            
            // 初始化時預設畫出折線圖
            document.getElementById('chart-type-selector').value = 'line';
            renderChart('line');

            // 準備錯題本下拉選單
            const filterSelect = document.getElementById('error-filter');
            filterSelect.innerHTML = '<option value="all">顯示全部單元</option>';
            for (const examId in completedRecords) {
                const record = completedRecords[examId];
                const examInfo = studentPersonalExams.find(e => e.id === examId);
                if (record && record.details && record.details.some(d => !d.isCorrect)) {
                    const option = document.createElement('option');
                    option.value = examId;
                    option.textContent = examInfo ? examInfo.title : "歷史測驗";
                    filterSelect.appendChild(option);
                }
            }
            renderErrorBook('all');
        }

        // 智慧圖表渲染引擎 (支援切換折線與雷達)
        function renderChart(type) {
            const completedExams = studentPersonalExams.filter(exam => completedRecords[exam.id]);
            const canvas = document.getElementById('scoreChart');
            const emptyMsg = document.getElementById('chart-empty-msg');
            
            if (completedExams.length === 0) {
                canvas.style.display = 'none';
                emptyMsg.style.display = 'block';
                return;
            }
            canvas.style.display = 'block';
            emptyMsg.style.display = 'none';

            // 依照時間排序
            completedExams.sort((a, b) => new Date(completedRecords[a.id].date || 0) - new Date(completedRecords[b.id].date || 0));
            // 如果是雷達圖，最多抓最近 6 次避免太擠；折線圖則全抓
            const examsToChart = type === 'radar' ? completedExams.slice(-6) : completedExams;

            let labels = examsToChart.map(e => e.title.length > 7 ? e.title.substring(0, 7) + "..." : e.title);
            let data = examsToChart.map(e => completedRecords[e.id].score);

            const ctx = canvas.getContext('2d');
            if (scoreChartInstance) scoreChartInstance.destroy();

            // 根據類型給予不同的樣式設定
            const datasetConfig = type === 'line' ? {
                label: '得分走勢', data: data,
                borderColor: '#8e9775', backgroundColor: 'rgba(142, 151, 117, 0.15)', borderWidth: 2,
                pointBackgroundColor: '#e74c3c', pointBorderColor: '#fff', pointRadius: 5, fill: true, tension: 0.3
            } : {
                label: '單元能力分佈', data: data,
                backgroundColor: 'rgba(142, 151, 117, 0.3)', borderColor: '#8e9775', borderWidth: 2,
                pointBackgroundColor: '#8e9775', pointBorderColor: '#fff', pointHoverBackgroundColor: '#fff'
            };

            const scaleConfig = type === 'line' ? {
                y: { beginAtZero: true, max: 100, ticks: { stepSize: 20 } }
            } : {
                r: { angleLines: { color: 'rgba(0,0,0,0.1)' }, grid: { color: 'rgba(0,0,0,0.1)' },
                     pointLabels: { font: { size: 12, family: "'Noto Serif TC', serif" }, color: '#5b6348' },
                     ticks: { beginAtZero: true, max: 100, stepSize: 20, display: false } }
            };

            scoreChartInstance = new Chart(ctx, {
                type: type,
                data: { labels: labels, datasets: [datasetConfig] },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: scaleConfig,
                    plugins: { legend: { display: false } }
                }
            });
        }

        // 質感字卡錯題渲染器
        function renderErrorBook(filterExamId) {
            const container = document.getElementById('error-book-container');
            const summary = document.getElementById('error-book-summary');
            container.innerHTML = ""; summary.innerHTML = "";
            let hasErrors = false; let errorCount = 0;

            for (const examId in completedRecords) {
                if (filterExamId !== 'all' && examId !== filterExamId) continue;
                const record = completedRecords[examId];
                const examInfo = studentPersonalExams.find(e => e.id === examId);

                if (record && record.details) {
                    record.details.forEach((detail) => {
                        if (!detail.isCorrect) {
                            hasErrors = true; errorCount++;
                            const originalQ = examInfo ? examInfo.questions.find(q => q.question === detail.originalQuestion) : null;
                            const currentExp = originalQ ? (originalQ.exp || originalQ.explanation) : "無解析資料";

                            container.innerHTML += `
                                <div class="clean-card">
                                    <div class="tag-pill">${examInfo ? examInfo.title : "歷史單元"}</div>
                                    <div style="font-size: 16px; font-weight: 700; margin-bottom: 12px; color: #333; line-height: 1.5;">${detail.originalQuestion}</div>
                                    <div style="font-size: 14px; margin-bottom: 6px; color: #555;">正確答案：<span style="color: #27ae60; font-weight: 700;">${detail.correctAnswer}</span></div>
                                    <div style="font-size: 14px; margin-bottom: 15px; color: #555;">你的答案：<span style="color: #e74c3c; font-weight: 700; text-decoration: line-through;">${detail.userPick}</span></div>
                                    <div style="background: #f8f8f6; padding: 12px; border-radius: 8px; font-size: 13px; color: #666; border-left: 3px solid var(--primary); line-height: 1.6;">
                                        <strong>老師解析：</strong><br>${currentExp}
                                    </div>
                                </div>
                            `;
                        }
                    });
                }
            }

            if (!hasErrors) {
                container.innerHTML = `<div style="text-align: center; color: #8e9775; padding: 40px; background: #fff; border-radius: 12px; font-weight: bold; font-size: 16px; border: 1px solid #f0f0f0;">目前沒有需要複習的錯題。</div>`;
            } else {
                summary.innerHTML = `篩選結果：共計 ${errorCount} 題需進行複習`;
            }

            if (window.MathJax) { setTimeout(() => { MathJax.typesetPromise([container]); }, 150); }
        }
    </script>
</body>
