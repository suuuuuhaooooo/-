<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <link rel="icon" href="https://suuuuuhaooooo.github.io/-/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="https://suuuuuhaooooo.github.io/-/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蘇昊數理｜家教課表</title>
    <meta name="description" content="透明呈現目前剩餘教學時段，系統每週更新，方便家長快速確認空檔並安排預約。">
    <meta property="og:title" content="蘇昊數理｜家教課表">
    <meta property="og:description" content="一目了然的排課系統。即時更新最新教學空檔，協助家長精準安排孩子的學習計畫。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://suuuuuhaooooo.github.io/-/schedule.html">
    <meta property="og:image" content="https://suuuuuhaooooo.github.io/-/og-image.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');

        :root {
            --primary: #8e9775;
            --secondary: #a2aab0;
            --bg-gradient: linear-gradient(135deg, #e9e9e9 0%, #f5f5f5 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-dark: #545b64;
            --unavailable-bg: #e8e8e8;
            --available-bg: #ffffff;
        }

        body {
            font-family: "Noto Sans TC", sans-serif;
            background: var(--bg-gradient);
            color: var(--text-dark);
            margin: 0;
            padding: 30px 15px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            /* 加入防反白選取 */
            user-select: none;
            -webkit-user-select: none;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--card-bg);
            padding: 50px 30px;
            border-radius: 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.08);
            backdrop-filter: blur(15px);
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header { text-align: center; margin-bottom: 40px; }
        .badge {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 6px 20px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        h1 { margin: 0; font-size: 32px; color: #3d444d; font-weight: 700; }

        .info-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 12px;
            color: #999;
            padding: 0 10px;
        }

        .table-wrapper { width: 100%; overflow-x: auto; padding: 10px 0; }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 8px 10px;
            min-width: 750px;
        }

        th {
            background-color: var(--secondary);
            color: white;
            font-weight: 500;
            padding: 18px 10px;
            border-radius: 12px;
            font-size: 16px;
        }

        td {
            text-align: center;
            padding: 15px 5px;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            height: 65px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .time-label {
            background-color: #f1f3f5;
            font-size: 13px;
            font-weight: 700;
            color: #888;
            width: 120px;
            line-height: 1.4;
        }

        td.x {
            background-color: var(--unavailable-bg);
            color: #b0b0b0;
            position: relative;
            cursor: not-allowed;
        }
        
        td.x::after {
            content: "已預約\00000aReserved"; 
            white-space: pre; 
            font-size: 10px;
            display: block;
            opacity: 0.5;
            letter-spacing: 1px;
            margin-top: 2px;
            line-height: 1.2;
        }

        td:not(.x):not(.time-label) {
            background-color: var(--available-bg);
            border: 1px solid #f0f0f0;
        }

        td:not(.x):not(.time-label):hover {
            background-color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            border-color: var(--primary);
            z-index: 10;
            cursor: pointer;
        }

        footer { margin-top: 45px; padding-top: 30px; border-top: 1px solid #eee; text-align: center; }
        .btn-group { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 20px; }
        .nav-btn { display: inline-block; padding: 12px 30px; border-radius: 50px; text-decoration: none; font-weight: 500; font-size: 16px; transition: 0.3s; }
        .btn-outline { border: 1.5px solid var(--primary); color: var(--primary); }
        .btn-outline:hover { background: var(--primary); color: white; }
        .btn-filled { background: #06c755; color: white; box-shadow: 0 10px 20px rgba(6, 199, 85, 0.15); }
        .btn-filled:hover { transform: scale(1.05); box-shadow: 0 12px 25px rgba(6, 199, 85, 0.25); }

        /* =========================================
           手機端專屬 App 級介面優化 (RWD) 
           ========================================= */
        @media (max-width: 768px) {
            /* 縮小外層邊距與圓角，把螢幕空間還給課表 */
            body { padding: 15px 10px; }
            .container { padding: 30px 15px; border-radius: 20px; }
            
            /* 標題微調 */
            header { margin-bottom: 25px; }
            h1 { font-size: 24px; }
            .badge { margin-bottom: 10px; padding: 5px 15px; font-size: 12px; }
            
            /* 課表表格維持橫向滑動，但稍微縮小間距與字體以顯示更多內容 */
            table { border-spacing: 5px 8px; min-width: 600px; }
            th { padding: 12px 5px; font-size: 14px; border-radius: 8px; }
            td { height: 55px; padding: 10px 2px; border-radius: 8px; }
            .time-label { width: 90px; font-size: 12px; }
            td.x::after { font-size: 9px; margin-top: 1px; }

            /* 底部與按鈕優化：改為滿版直排，觸控更直覺 */
            footer { margin-top: 30px; padding-top: 25px; }
            .btn-group { flex-direction: column; align-items: stretch; gap: 12px; }
            .nav-btn { width: 100%; max-width: none; box-sizing: border-box; padding: 12px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <span class="badge">PROFESSIONAL TUTORING</span>
        <h1>114-2 學期排課總表</h1>
    </header>

    <div class="info-bar">
        <span>※ 點擊空白處可即時聯繫預約</span>
        <span id="update-date">讀取中...</span>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th style="background:#b8beb5">時段</th>
                    <th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th><th>日</th>
                </tr>
            </thead>
            <tbody id="schedule-body">
                <tr><td colspan="8" style="text-align:center; padding: 50px; color:#ccc;">資料庫同步中，請稍候...</td></tr>
            </tbody>
        </table>
    </div>

    <footer>
        <p>如需安排試教或調整時間，歡迎直接聯繫洽詢</p>
        <div class="btn-group">
            <a href="profile.html" class="nav-btn btn-outline">查看師資簡介</a>
            <a href="https://line.me/ti/p/~@000gwomo" class="nav-btn btn-filled">立即聯繫官方 LINE</a>
        </div>
    </footer>
</div>

<script>

    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyV1ygP4g7yNr_xYTN9DkWppOlCD0oKb8pW_UC2AAyFaLHDO0VJKUfv2myJq0QNM5shBQ/exec';

    async function syncSchedule() {
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            
            // 1. 顯示真正的最後存檔時間
            document.getElementById('update-date').innerText = '最後更新：' + data.lastUpdated;

            // 2. 渲染表格內容
            const body = document.getElementById('schedule-body');
            body.innerHTML = ''; 

            data.schedule.forEach(row => {
                const tr = document.createElement('tr');
                
                row.forEach((cell, index) => {
                    const td = document.createElement('td');
                    const val = cell ? cell.toString().trim().toLowerCase() : '';

                    if (index === 0) {
                        // 第一欄：時段標籤
                        td.className = 'time-label';
                        td.innerText = cell;
                    } else if (val === 'x') {
                        // 已預約：加上 .x class
                        td.className = 'x';
                    } else {
                        // 可預約：增加跳轉功能
                        td.onclick = () => { window.location.href = "https://line.me/ti/p/~@000gwomo"; };
                    }
                    tr.appendChild(td);
                });
                body.appendChild(tr);
            });

        } catch (error) {
            console.error('同步失敗:', error);
            document.getElementById('update-date').innerText = '狀態：暫時無法連線';
        }
    }

    // 啟動同步
    syncSchedule();

    // -----------------------------------------
    // 反開發者工具與右鍵保護機制
    // -----------------------------------------
    
    // 1. 鎖定右鍵
    document.addEventListener('contextmenu', function(event) {
        event.preventDefault();
        alert("版權所有，翻印必究！");
    });

    // 2. 鎖定鍵盤快捷鍵 (F12, Ctrl+Shift+I/J, Ctrl+U)
    document.addEventListener('keydown', function(event) {
        if (event.keyCode === 123 || 
           (event.ctrlKey && event.shiftKey && (event.keyCode === 73 || event.keyCode === 74)) || 
           (event.ctrlKey && event.keyCode === 85)) { 
            event.preventDefault();
            alert("【警告】\n\n嚴禁開啟開發者工具！");
        }
    });

    // 3. 簡易 debugger 陷阱 (偵測開發者工具開啟)
    setInterval(function() {
        const before = new Date().getTime();
        debugger; 
        const after = new Date().getTime();
        if (after - before > 100) {
            // 如果偵測到被暫停，清空畫面並踢回首頁
            document.body.innerHTML = "<div style='text-align:center; padding: 50px; font-size: 20px; font-weight: bold; color: #c0392b;'>系統安全機制已啟動，網頁已鎖定。</div>";
            window.location.replace("index.html"); 
        }
    }, 1000);
</script>

</body>
</html>
