    <script>
        // 核心函式定義 (放在最前面，解決 is not defined)
        function updateStatus(text, dotColor) {
            const statusText = document.getElementById('system-status-text');
            const statusDot = document.getElementById('system-status-dot');
            if (statusText && statusDot) {
                statusText.innerText = text;
                statusDot.style.backgroundColor = dotColor;
            }
        }

        const chatWindow = document.getElementById('chat-window');
        const MY_LIFF_ID = "2010007538-HEESDWze"; 
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwxFfufe0b7eJpDxSmLgnbVvlq1itLvoD6ZCpvDJKtJg7ChcWn7lpf9LgZqQ4ZsThJiXQ/exec";
        
        window.sessionImage = null;       
        window.initialResponse = "";      
        window.followUps = [];            
        window.activeTaskId = null; // 全域儲存目前的 taskId

        // Firebase 系統設定
        const firebaseConfig = {
            apiKey: "AIzaSyALkTnkYY3JZLCTyajahpi4IZKmFX9USdw",
            authDomain: "su-hao-classroom.firebaseapp.com",
            projectId: "su-hao-classroom",
            storageBucket: "su-hao-classroom.firebasestorage.app",
            messagingSenderId: "764168135846",
            appId: "1:764168135846:web:f2923a5f4952fa1ca64067",
            databaseURL: "https://su-hao-classroom-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const SYSTEM_PROMPT = `
        你是一位台灣具備頂尖教學經驗、邏輯嚴謹的國高中數理家教。
        你的目標是引導學生深刻理解觀念，而非僅僅給出答案。

        【限制】：
        1. 領域限制：僅限解答「數學」與「自然科（物理、化學、生物、地科）」的題目。若圖片內容為其他科目、模糊不清或無關閒聊，請一律終止解題並回覆：「很抱歉，本解題系統僅支援數學與自然之題目。」
        2. 嚴禁任何開場白、廢話或結語（例如：根據圖片、以下是解析...等）。
        3. 必須直接從「### 破題分析」開始輸出，直到解答結束。
        4. 全程禁用emoji。
        5. 若圖片方向顛倒或歪斜，請自行判定正確的文字方向後進行解題。
        6. 請一律「只解答最居中或最清晰的一題」，並在解答開頭（破題分析前）用一行字溫馨提醒：「同學你好，為了提供最詳細的解析，本次僅為你解答第 X 題。若需解答其他題目，請將單一題目截圖後重新上傳哦！」

        【排版與語法規範】：
        1. 語言：請一律使用繁體中文，用詞需學術、專業且嚴謹。
        2. 數學算式：嚴格使用 LaTeX 語法。行內公式必須使用 $ 包覆（例如：$x=2$），獨立成行的置中公式必須使用 $$ 包覆（例如：$$y = ax^2 + bx + c$$）。
        3. 圖解輔助（條件式輸出）：若題目為需要簡圖且需要圖像輔助說明的題型，請務必使用 TikZ 語法繪製簡圖。
           - 只有當題目需要簡圖時，且「不畫圖學生不好理解」時，才在「### 解題思路」區塊中插入 TikZ 繪圖代碼。
           - 繪圖程式碼必須完全相容於 pdflatex。
           - 繪圖程式碼必須直接輸出 \\begin{tikzpicture} ... \\end{tikzpicture}，不需要包含 \\documentclass 或 \\usepackage 等前置宣告。
           - 圖形需力求簡潔、比例正確，並標示該圖繪需要的參數。
           - 若為純代數計算、邏輯判斷等無需圖像輔助的題型，請「嚴格禁止」輸出任何 TikZ 程式碼或空白繪圖區塊，以節省算力。
           - 程式碼必須為最標準、基礎的 TikZ 語法，確保能完美相容於基礎的 pdfLaTeX 引擎，絕對禁止呼叫 pgfplots 或其他需要額外載入的特殊套件。
           - 請利用 scale 參數控制圖形大小，避免圖形過於龐大超出網頁邊界。節點文字 (node) 必須確保不與線條重疊。
        4. 若無法確定題目資訊、符號、圖片細節或數值，禁止自行腦補或猜測，必須明確指出哪部分無法辨識。
        5. 若為計算題，每一步皆需重新檢查前一步的運算結果，避免符號錯誤與計算失誤。
        6. 【嚴格禁止雙重下標與連續底線】：在 LaTeX 公式 ($ 或 $$ 內) 絕對禁止出現連續底線 (如 $____$) 來代表填空，填空請一律改用 \text{( )} 或 \square 表示。變數下標若包含多個字元，必須嚴格使用大括號包覆 (例如：請寫 $A_{甲}$ 或 $S_{表面積}$，絕對禁止寫出 $A_甲_面$ 這種雙重下標格式)，否則會導致前端編譯嚴重崩潰。
        7. 乘法請一律使用 $\times$ (\times)，除法請使用 $\div$ (\div)，絕對禁止使用 * 或 / 作為四則運算符號。分數請一律使用 $\frac{a}{b}$ (\frac{}{}) 呈現。向量請使用 $\vec{v}$ (\vec{})。
        
        【初次解析回覆格式】：
        若你是在初次解析圖片，請嚴格按照以下四個區塊來建構你的回覆，並使用 Markdown 的 ### 標題格式：
        ### 破題分析
        （請在此區塊簡潔地列出題目給定的「已知條件」、「求解目標」，以及本題測驗的「核心觀念或公式」。）
        ### 解題思路
        （請在進行複雜計算前，先用一段話告訴學生「我們為什麼要這樣算」、「切入點在哪裡」。若有需要，可插入 TikZ 簡圖輔助說明邏輯。）
        ### 解題步驟
        （請以列表方式（Step 1, Step 2, Step 3...），一步一步詳細寫下計算過程。每一個算式轉換都必須交代理由，具備絕對的邏輯連貫性，切勿跳躍步驟。）
        ### 解答
        （請以明確、精煉的方式給出最終答案，答案請用 latex 用外框包住，例如：$$ \\boxed{ \\text{在此處填入最終答案內容} } $$。若有單位請務必標示清楚。例如：故本題答案為 $x = 5$ 或 $\\text{速度} = 10 \\text{ m/s}$。）
        ### ☆ 不昊你時間小撇步
        （若此題有「速解法」、「秒殺公式」、「極限代入法」或「考試偷吃步」，請在此區塊簡短分享。請用補習班名師分享秘訣的輕鬆、自信口吻來撰寫。**若此題為必須按部就班計算的常規題、真的沒有速解法，請絕對要直接省略此區塊，嚴禁為了寫而硬湊。**）
        ### 題目價值評鑑
           - **考點：** （用一句話說明原因）
           - **延伸觀念：** （用一句話說明）
           - **難易度：** （以一顆★來代表評估為簡單、兩顆★代表中等、三顆★則是困難，並用一句話說明原因）
           - **認知向度：** （依據修訂版 Bloom 認知分類，從「記憶、瞭解、應用、分析、評鑑、創作」中挑選最符合的向度並用一句話說明原因）
           - **知識向度：** （依據修訂版 Bloom 認知分類，從「事實知識、概念知識、程序知識、後設認知知識」中挑選最符合的向度並用一句話說明原因）
        【後續追問回覆格式】：
        1. 若學生是對先前的解析提出疑問，請直接針對他的問題進行親切、耐心的引導與講解，不需再套用上述四大區塊。
        2. 不需套用上述的 ### 標題格式，請直接回覆文字內容即可。
        `;

        // ==========================================
        // 2. 啟動主流程 (地毯式搜尋 taskId)
        // ==========================================
        initializeLiff();

        async function initializeLiff() {
            try {
                await liff.init({ liffId: MY_LIFF_ID });
                
                if (!liff.isInClient()) {
                    showError("【系統通知】\n為保護權益，本系統僅限在 LINE 聊天室內部開啟。");
                    document.getElementById('input-bar').style.display = "none";
                    return; 
                }

                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }

                // 終極地毯式搜尋 taskId
                let tid = new URLSearchParams(window.location.search).get('taskId'); 
                if (!tid) {
                    const searchData = liff.getSearchData();
                    if (searchData) tid = new URLSearchParams(searchData).get('taskId');
                }
                if (!tid) {
                    const hashData = window.location.hash.split('?')[1];
                    if (hashData) tid = new URLSearchParams(hashData).get('taskId');
                }

                if (!tid) {
                    showError("無效的解題連結！請由 LINE 官方帳號重新發起請求。");
                    return;
                }

                window.activeTaskId = tid; // 存入全域變數
                const profile = await liff.getProfile();
                fetchTaskDataSecurely(tid, profile.userId);

            } catch (err) {
                showError("LINE 驗證初始化失敗：" + err.message);
            }
        }

        function fetchTaskDataSecurely(tid, visitorUid) {
            db.ref("ai_tasks/" + tid).once("value").then((snap) => {
                const data = snap.val();
                if (!data) {
                    showError("找不到此題目的資料，提問可能已過期。");
                    return;
                }

                // 權限檢查
                if (data.uid !== visitorUid) {
                    showError("【系統通知】\n此解析僅限發問者本人檢視。若您是學生，請親自上傳題目！");
                    document.getElementById('input-bar').style.display = "none";
                    return;
                }

                if (data.image) window.sessionImage = data.image;

                if (data.status === "completed" && data.ai_response) {
                    window.initialResponse = data.ai_response;
                    window.followUps = data.follow_ups || [];
                    renderInitialResult(data.ai_response);
                    renderChatHistory(); 
                } else {
                    updateStatus("解題中", "#f1c40f");
                    document.getElementById('loading-text').innerText = "AI 解題幫手正在進行邏輯拆解與運算...";
                    callGeminiFirstTurn(data.image, tid, data.uid);
                }
            }).catch(err => showError("資料庫連線失敗：" + err.message));
        }

        async function callGeminiFirstTurn(base64Img, tid, uid) {
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST', headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ 
                        action: "smartSolveImage", 
                        image: base64ImageClean(base64Img),
                        systemPrompt: SYSTEM_PROMPT 
                    })
                });
                
                const resultText = await response.text();
                let result = JSON.parse(resultText);
                
                if (result.success && result.text) {
                    window.initialResponse = result.text;
                    renderInitialResult(result.text);
                    db.ref("ai_tasks/" + tid).update({ status: "completed", ai_response: result.text, image: null });
                } else { 
                    throw new Error(result.error || "AI 解題幫手忙線中，請稍後重試。"); 
                }
            } catch (error) { showError("【錯誤】" + error.message); }
        }
        async function sendFollowUp() {
            const inputEl = document.getElementById('chat-input');
            const userText = inputEl.value.trim();
            if (!userText || !window.activeTaskId) return;
            
            inputEl.value = ""; inputEl.disabled = true;
            appendChatBubble('user', userText);
            const loadingId = appendChatBubble('ai', "<div class='loading-dots' style='margin:0;'><div></div><div></div><div></div></div>");
            scrollToBottom();

            let apiContents = [];
            if (window.sessionImage) apiContents.push({ role: "user", parts: [{ text: "題目圖" }, { inline_data: { mime_type: "image/jpeg", data: base64ImageClean(window.sessionImage) } }] });
            apiContents.push({ role: "model", parts: [{ text: window.initialResponse }] });
            window.followUps.forEach(msg => apiContents.push({ role: msg.role === 'user' ? "user" : "model", parts: [{ text: msg.text }] }));
            apiContents.push({ role: "user", parts: [{ text: userText }] });

            try {
                const response = await fetch(SCRIPT_URL, { 
                    method: 'POST', headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ action: "askGemini", geminiPayload: { system_instruction: { parts: [{ text: SYSTEM_PROMPT }] }, contents: apiContents } }) 
                });
                const result = await response.json();
                const aiReply = result?.candidates?.[0]?.content?.parts?.[0]?.text;
                document.getElementById(loadingId).remove();
                if (aiReply) {
                    appendChatBubble('ai', formatAIResponse(aiReply));
                    window.followUps.push({ role: "user", text: userText }, { role: "model", text: aiReply });
                    db.ref("ai_tasks/" + window.activeTaskId).update({ follow_ups: window.followUps });
                    triggerMathJax();
                }
            } catch (e) { document.getElementById(loadingId).innerText = "錯誤: " + e.message; }
            inputEl.disabled = false; inputEl.focus(); scrollToBottom();
        }

        // 3. 輔助功能
        function appendChatBubble(role, html, id = null) {
            const b = document.createElement('div');
            b.className = `bubble ${role} ${role === 'ai' ? 'ai-content' : ''}`;
            b.innerHTML = html;
            const cid = id || "id_" + Date.now();
            b.id = cid; chatWindow.appendChild(b); return cid;
        }

        function renderInitialResult(text) {
            document.getElementById('loading-area').style.display = "none";
            if (window.sessionImage) appendChatBubble('user', `<img src="data:image/jpeg;base64,${window.sessionImage}" class="question-thumb" onclick="window.open(this.src)"><div style="font-size:13px; opacity:0.8;">這是我想問的題目。</div>`);
            appendChatBubble('ai', formatAIResponse(text));
            document.getElementById('input-bar').style.display = "flex";
            updateStatus("解析完成", "#8e9775");
            triggerMathJax();
            setTimeout(scrollToBottom, 300);
        }

        function renderChatHistory() {
            window.followUps.forEach(m => appendChatBubble(m.role==='user'?'user':'ai', m.role==='user'?m.text:formatAIResponse(m.text)));
            triggerMathJax(); setTimeout(scrollToBottom, 300);
        }

        function showError(m) {
            document.getElementById('loading-area').style.display = "none";
            appendChatBubble('ai', `<div class="error-msg">${m}</div>`);
            updateStatus("發生異常", "#c0392b");
        }

        function formatAIResponse(text) {
            let processed = text.replace(/\\begin\{tikzpicture\}([\s\S]*?)\\end\{tikzpicture\}/g, m => `<script type="text/tikz">\n${m}\n<\/script>`);
            marked.setOptions({ breaks: true, gfm: true });
            return marked.parse(processed);
        }

        function triggerMathJax() { if (window.MathJax) MathJax.typesetPromise().catch(e => console.log(e.message)); }
        function base64ImageClean(s) { return s.includes(",") ? s.split(",")[1] : s; }
        function scrollToBottom() { window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); }
        
        document.getElementById('chat-input').addEventListener('keypress', e => { if (e.key === 'Enter') sendFollowUp(); });
        document.addEventListener('contextmenu', e => { e.preventDefault(); alert("版權所有，翻印必究！"); });
    </script>
</body>
</html>
