<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <link rel="icon" href="https://suuuuuhaooooo.github.io/-/favicon.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蘇昊數理｜管理後臺</title>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');

        :root { --admin-primary: #1e3a8a; --admin-dark: #172554; --admin-accent: #10b981; --bg: #f3f4f6; }
        body { font-family: "Noto Serif TC", serif; background-color: var(--bg); margin: 0; color: #333; height: 100vh; overflow: hidden; display: flex;}


        #login-ui { display: flex; justify-content: center; align-items: center; width: 100%; height: 100vh; position: fixed; top: 0; left: 0; background: var(--bg); z-index: 10000; }
        .login-card { background: white; padding: 50px; border-radius: 12px; box-shadow: 0 15px 50px rgba(0,0,0,0.1); width: 340px; text-align: center; border-top: 8px solid var(--admin-primary); }
        .badge { display: inline-block; background: #ef4444; color: white; font-size: 11px; padding: 4px 10px; border-radius: 15px; margin-bottom: 25px; font-weight: bold; letter-spacing: 1px; }
        input { width: 100%; padding: 14px; margin: 12px 0; border: 1px solid #ddd; border-radius: 6px; outline: none; }
        input:focus { border-color: var(--admin-primary); box-shadow: 0 0 0 3px rgba(30,58,138,0.1); }
        .login-btn { background: var(--admin-primary); color: white; border: none; padding: 14px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 6px; transition: 0.3s; margin-top: 15px; letter-spacing: 2px;}
        .login-btn:hover { background: var(--admin-dark); }


        #admin-ui { display: none; width: 100%; height: 100vh; }
        

        .sidebar { width: 260px; background: var(--admin-primary); color: white; display: flex; flex-direction: column; padding: 30px 0; flex-shrink: 0;}
        .sidebar h2 { text-align: center; font-size: 20px; margin-bottom: 40px; letter-spacing: 3px; font-weight: 700; color: white; }
        .nav-link { padding: 18px 30px; color: #93c5fd; text-decoration: none; cursor: pointer; transition: 0.2s; font-size: 15px; display: flex; align-items: center; gap: 10px; border-left: 4px solid transparent;}
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.05); color: white; border-left-color: var(--admin-accent); font-weight: 700;}
        

        .main-content { flex-grow: 1; padding: 40px; background: var(--bg); overflow-y: auto; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; margin-bottom: 30px; }
        .logout-btn { background: rgba(255,255,255,0.1); color: #333; border: 1px solid #ccc; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;}
        .logout-btn:hover { background: #fee2e2; color: #ef4444; border-color: #fecaca;}


        

        .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; }
        .kpi-title { font-size: 14px; color: #666; margin-bottom: 10px; display: flex; align-items: center; gap: 8px;}
        .kpi-value { font-size: 36px; font-weight: 700; color: var(--admin-primary); }
        .kpi-dot { width: 10px; height: 10px; background: #666; border-radius: 50%; position: absolute; top: 25px; right: 25px; }
        .kpi-active { background: var(--admin-accent); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }

        
        .chart-card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); margin-bottom: 30px; }
        .chart-title { font-size: 16px; font-weight: 700; color: var(--admin-primary); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
  
        .bottom-row { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; }
        

        #dashboard-loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(243,244,246,0.9); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { border: 4px solid #eee; border-top: 4px solid var(--admin-primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="login-ui">
        <div class="login-card">
            <h1>蘇昊數理管理後臺</h1>
            <div class="badge">管理員專屬 Admin Only</div>
            <input type="email" id="admin-email" placeholder="管理員管理帳號">
            <input type="password" id="admin-password" placeholder="管理員密碼">
            <button class="login-btn" onclick="adminLogin()">登入控制台</button>
        </div>
    </div>

    <div id="dashboard-loading">
        <div class="spinner"></div>
        <div style="color: var(--admin-primary); font-weight: bold; font-size: 14px;">即時數據同步中...</div>
    </div>

    <div id="admin-ui" style="display: none;">
        <nav class="sidebar">
            <h2>蘇昊老師</h2>
            <a class="nav-link active">即時監控雷達</a>
            <a class="nav-link" onclick="alert('功能建設中...')">學員教務管理</a>
            <a class="nav-link" onclick="alert('功能建設中...')">安全與 IP 黑名單</a>
            <div style="flex-grow: 1;"></div>
            <div style="text-align: center; color: #93c5fd; font-size: 12px; margin-bottom: 20px;">v2.0 Command Center</div>
        </nav>
        <main class="main-content">
            <header class="dashboard-header">
                <h1 style="margin: 0; color: var(--admin-primary); font-size: 24px;">即時監控雷達</h1>
                <button class="logout-btn" onclick="logout()">登出</button>
            </div>

            <section class="kpi-row">
                <div class="kpi-card">
                    <div class="kpi-title">即時在線人數</div>
                    <div class="kpi-value" id="online-count">--</div>
                    <div class="kpi-dot kpi-active" id="online-dot"></div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-title">總學員人數</div>
                    <div class="kpi-value" id="total-students">--</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-title">當前封鎖 IP</div>
                    <div class="kpi-value" id="total-banned">--</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-title">今日新啟用帳號</div>
                    <div class="kpi-value" id="today-activated">--</div>
                </div>
            </section>

            <section class="chart-card">
                <div class="chart-title">近七日系統流量趨勢 (登入 & 啟用)</div>
                <div style="height: 300px;">
                    <canvas id="trafficChart"></canvas>
                </div>
            </section>

            <section class="bottom-row">
                <div class="chart-card">
                    <div class="chart-title">學員年級分佈分析</div>
                    <div style="height: 250px; display: flex; justify-content: center;">
                        <canvas id="gradeChart"></canvas>
                    </div>
                </div>
                <div class="chart-card">
                    <div class="chart-title">熱門解題影片排行榜 (觀看數)</div>
                    <div style="height: 250px;">
                        <canvas id="videoChart"></canvas>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <script>

        const firebaseConfig = {
            apiKey: "AIzaSyALkTnkYY3JZLCTyajahpi4IZKmFX9USdw",
            authDomain: "su-hao-classroom.firebaseapp.com",
            projectId: "su-hao-classroom",
            storageBucket: "su-hao-classroom.firebasestorage.app",
            messagingSenderId: "764168135846",
            appId: "1:764168135846:web:f2923a5f4952fa1ca64067",
            databaseURL: "https://su-hao-classroom-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwxFfufe0b7eJpDxSmLgnbVvlq1itLvoD6ZCpvDJKtJg7ChcWn7lpf9LgZqQ4ZsThJiXQ/exec";


        let trafficChartInstance, gradeChartInstance, videoChartInstance;


        function adminLogin() {
            const email = document.getElementById('admin-email').value;
            const pwd = document.getElementById('admin-password').value;
            if(!email || !pwd) { alert("請輸入帳號密碼"); return; }
            auth.signInWithEmailAndPassword(email, pwd).catch(err => alert("登入失敗：" + err.message));
        }

        function logout() { auth.signOut().then(() => location.reload()); }

        
        auth.onAuthStateChanged(async (user) => {
            if (user) {

                if (user.uid === '5F6F4HEDhpZbYMp7liT4czX0syI3') {
                    document.getElementById('login-ui').style.display = 'none';
                    document.getElementById('admin-ui').style.display = 'flex';
                    showLoading();
                    

                    db.ref('presence').on('value', snap => {
                        const count = snap.numChildren() || 0;
                        document.getElementById('online-count').innerText = count;
                    });
                    

                    db.ref('ip_bans').on('value', snap => {
                        const count = snap.numChildren() || 0;
                        document.getElementById('total-banned').innerText = count;
                    });


                    try {
                        const r = await fetch(SCRIPT_URL + "?token=SuHaoClassroom2026_SecureKey");
                        const fullData = await r.json();
                        
                        
                        document.getElementById('total-students').innerText = fullData.length;
                        const today = new Date().toLocaleDateString('zh-TW');
                        const todayActivated = fullData.filter(student => {
                            return student.activateTime && new Date(student.activateTime).toLocaleDateString('zh-TW') === today;
                        }).length;
                        document.getElementById('today-activated').innerText = todayActivated;


                        initCharts(fullData);
                        
                    } catch (e) {
                        console.error("抓取 Sheets 資料失敗", e);
                        alert("部分數據抓取失敗，請確認 GAS 連結或網路連線。");
                    }
                    
                    hideLoading();

                } else {
                    alert('【警告】權限不足！此為管理員專屬通道，將強制登出您的帳號。');
                    auth.signOut();
                }
            } else {
                document.getElementById('login-ui').style.display = 'flex';
                document.getElementById('admin-ui').style.display = 'none';
            }
        });


        function initCharts(data) {

            Chart.defaults.font.family = "'Noto Serif TC', serif";

            const ctxTraffic = document.getElementById('trafficChart').getContext('2d');
            const dates = Array.from({length: 7}, (_, i) => {
                const d = new Date(); d.setDate(d.getDate() - (6-i)); 
                return (d.getMonth()+1)+'/'+d.getDate();
            });
            trafficChartInstance = new Chart(ctxTraffic, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [
                        { label: '學員登入次數', data: [5, 12, 9, 15, 11, 18, 5], borderColor: '#10b981', tension: 0.3, fill: false },
                        { label: '新帳號啟用數', data: [10, 8, 9, 5, 8, 4, 12], borderColor: '#1e3a8a', tension: 0.3, fill: false }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, grid: { color: '#eee' } } } }
            });


            const ctxGrade = document.getElementById('gradeChart').getContext('2d');
            const levels = data.map(s => parseInt(s.level) || 0);
            const highSchoolCount = levels.filter(l => l >= 10 && l <= 12).length;
            const juniorHighCount = levels.filter(l => l >= 7 && l <= 9).length;
            
            gradeChartInstance = new Chart(ctxGrade, {
                type: 'doughnut',
                data: {
                    labels: ['國中 (7-9年級)', '高中 (10-12年級)'],
                    datasets: [{
                        data: [juniorHighCount, highSchoolCount],
                        backgroundColor: ['#172554', '#10b981'], 
                        borderWidth: 0
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
            });


            const ctxVideo = document.getElementById('videoChart').getContext('2d');
            

            const videoLabels = ['平面幾何解題', '電學綜合練習', '多項式定理', '運動學公式應用', '指數與對數函式'];
            const videoViews = [1350, 1100, 980, 820, 650];

            videoChartInstance = new Chart(ctxVideo, {
                type: 'bar',
                data: {
                    labels: videoLabels,
                    datasets: [{
                        label: '觀看次數',
                        data: videoViews,
                        backgroundColor: ['#172554','#10b981','#10b981','#10b981','#10b981'], 
                        borderRadius: 5
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } }, plugins: { legend: { display: false } } }
            });
        }


        function showLoading() { document.getElementById('dashboard-loading').style.display = 'flex'; }
        function hideLoading() { document.getElementById('dashboard-loading').style.display = 'none'; }
    </script>
</body>
</html>
