<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <link rel="icon" href="https://suuuuuhaooooo.github.io/-/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="https://suuuuuhaooooo.github.io/-/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蘇昊數理｜教務管理系統</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                processEscapes: true
            },
            options: {
                skipHtmlTags: ['script', 'style', 'textarea']
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        :root { --primary: #8e9775; --dark: #5b6348; --bg: #f8f8f6; --white: #ffffff; --border: #ececec; }
        
        body { 
            font-family: "Noto Serif TC", serif; background-color: var(--bg); margin: 0; color: #333; height: 100vh; overflow: hidden; 
            user-select: none; -webkit-user-select: none;
        }

        /* 讀取動畫 */
        #loading-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background-color: var(--bg); position: fixed; width: 100%; z-index: 9999; top: 0; left: 0; }
        .loading-dots { display: flex; gap: 8px; }
        .loading-dots div { width: 10px; height: 10px; background-color: var(--primary); border-radius: 50%; animation: bounce 0.5s infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); opacity: 0.6; } to { transform: translateY(-10px); opacity: 1; } }

        /* 登入介面 */
        #login-ui { display: flex; justify-content: center; align-items: center; height: 100vh; background: var(--bg); position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; }
        .login-card { background: white; padding: 40px; border-radius: 4px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); width: 340px; text-align: center; border-top: 6px solid var(--primary); }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #eee; background: #fafafa; box-sizing: border-box; outline: none; }
        .main-btn { background: var(--primary); color: white; border: none; padding: 14px; width: 100%; cursor: pointer; font-weight: 700; border-radius: 2px; transition: 0.3s; }

        /* 管理後臺架構 */
        #admin-ui { display: none; height: 100vh; width: 100%; }
        .sidebar { width: 260px; background: white; border-right: 1px solid #eee; display: flex; flex-direction: column; padding: 30px 0; flex-shrink: 0; }
        .sidebar-brand { padding: 0 30px 30px; border-bottom: 1px solid #f5f5f5; margin-bottom: 20px; }
        .nav-link { display: block; padding: 15px 30px; text-decoration: none; color: #777; font-size: 0.95em; cursor: pointer; border-left: 4px solid transparent; transition: 0.2s; }
        .nav-link.active { background: #f4f6f4; color: var(--primary); border-left-color: var(--primary); font-weight: 700; }

        .main-content { flex-grow: 1; overflow-y: auto; padding: 40px; box-sizing: border-box; }
        .view-section { display: none; animation: fadeIn 0.4s; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 數據元件樣式 */
        .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 35px; }
        .kpi-card { background: white; padding: 25px; border: 1px solid var(--border); border-radius: 4px; }
        .kpi-label { font-size: 12px; color: #999; font-weight: 700; margin-bottom: 8px; }
        .kpi-value { font-size: 28px; font-weight: 700; color: var(--dark); }

        .table-container { background: white; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: left; }
        th { background: #f9faf9; padding: 15px; color: #777; border-bottom: 2px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid var(--border); }
        tr:hover { background: #fcfcfc; }

        .detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .back-btn { background: none; border: 1px solid var(--primary); color: var(--primary); padding: 8px 15px; cursor: pointer; font-weight: 700; }
        
        /* 深度審查題目樣式 (支援 LaTeX 渲染) */
        .paper-item { background: white; padding: 25px; border-radius: 4px; border: 1px solid var(--border); margin-bottom: 20px; }
        .q-text { font-weight: 700; font-size: 16px; margin-bottom: 15px; line-height: 1.6; color: var(--dark); }
        .ans-row { padding: 12px; border-radius: 4px; margin: 8px 0; font-size: 14px; border: 1px solid transparent; }
        .ans-correct { background: #f0fdf4; color: #166534; border-color: #bbf7d0; font-weight: 600; }
        .ans-wrong { background: #fef2f2; color: #991b1b; border-color: #fecaca; text-decoration: line-through; }
        .exp-box { background: #f9f9f7; padding: 15px; border-left: 4px solid var(--primary); margin-top: 15px; color: #666; font-size: 13px; line-height: 1.7; }

        .tag { font-size: 11px; padding: 2px 8px; border-radius: 12px; background: #eee; color: #888; margin-right: 5px; font-weight: 700; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="loading-screen" style="display:none;">
        <div class="loading-dots"><div></div><div></div><div></div></div>
        <div style="margin-top:20px; font-size:13px; color:var(--dark); font-weight:700;">同步雲端紀錄與 LaTeX 數學公式中...</div>
    </div>

    <div id="login-ui">
        <div class="login-card">
            <h1 style="font-size: 22px; letter-spacing: 4px; margin-bottom: 10px;">教務管理系統</h1>
            <div style="font-size: 12px; color: #aaa; margin-bottom: 30px;">蘇昊數理專業教學後臺</div>
            <input type="email" id="adm-email" placeholder="管理員帳號">
            <input type="password" id="adm-pass" placeholder="密碼">
            <button class="main-btn" onclick="login()">驗證身分並登入</button>
        </div>
    </div>

    <div id="admin-ui">
        <nav class="sidebar">
            <div class="sidebar-brand">
                <div style="font-weight: 700; font-size: 18px; color: var(--primary);">教務指揮中心</div>
                <div style="font-size: 11px; color: #aaa;">ADMIN DASHBOARD</div>
            </div>
            <a class="nav-link active" onclick="showSection('dashboard-view')">數據指標總覽</a>
            <a class="nav-link" onclick="showSection('log-view')">作答日誌審查</a>
            <a class="nav-link" onclick="window.location.reload()">強制同步數據</a>
            <div style="margin-top: auto; padding: 30px;">
                <div style="color:#b03a2e; font-size:12px; font-weight:700; cursor:pointer;" onclick="logout()">安全登出系統</div>
            </div>
        </nav>

        <main class="main-content">
            <section id="dashboard-view" class="view-section active">
                <h2 style="border-left: 5px solid var(--primary); padding-left: 15px; font-size: 20px;">即時教學指標</h2>
                <div class="kpi-row">
                    <div class="kpi-card"><div class="kpi-label">今日在線人數</div><div class="kpi-value" id="kpi-online">0</div></div>
                    <div class="kpi-card"><div class="kpi-label">測驗累積人次</div><div class="kpi-value" id="kpi-count">0</div></div>
                    <div class="kpi-card"><div class="kpi-label">全體測驗均分</div><div class="kpi-value" id="kpi-avg">0</div></div>
                </div>

                <h2 style="border-left: 5px solid var(--primary); padding-left: 15px; font-size: 20px; margin-top: 40px;">試卷題目熱點分析</h2>
                <div class="table-container">
                    <table id="exam-summary-table">
                        <thead><tr><th>試卷 ID</th><th>測驗名稱</th><th>人數</th><th>平均分</th><th>高錯誤率題號排行</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </section>

            <section id="log-view" class="view-section">
                <h2 style="border-left: 5px solid var(--primary); padding-left: 15px; font-size: 20px;">學員作答日誌與資安紀錄</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>交卷時間</th>
                                <th>學員姓名</th>
                                <th>登入 IP / 設備</th>
                                <th>登入次數 (日/總)</th>
                                <th>分數</th>
                                <th>管理操作</th>
                            </tr>
                        </thead>
                        <tbody id="log-list-body"></tbody>
                    </table>
                </div>
            </section>

            <section id="detail-view" class="view-section">
                <div class="detail-header">
                    <h2 id="detail-title">深度作答審查</h2>
                    <button class="back-btn" onclick="showSection('log-view')">返回流水日誌</button>
                </div>
                <div id="paper-container"></div>
            </section>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyALkTnkYY3JZLCTyajahpi4IZKmFX9USdw",
            authDomain: "su-hao-classroom.firebaseapp.com",
            projectId: "su-hao-classroom",
            storageBucket: "su-hao-classroom.firebasestorage.app",
            messagingSenderId: "764168135846",
            appId: "1:764168135846:web:f2923a5f4952fa1ca64067",
            databaseURL: "https://su-hao-classroom-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwxFfufe0b7eJpDxSmLgnbVvlq1itLvoD6ZCpvDJKtJg7ChcWn7lpf9LgZqQ4ZsThJiXQ/exec";

        let fullQuestionBank = []; 

        function showSection(id) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(n => {
                n.classList.remove('active');
                if(n.innerText.includes(document.querySelector(`#${id} h2`).innerText.substring(0,2))) n.classList.add('active');
            });
            // 🚀 切換視圖時重新渲染 LaTeX
            if (window.MathJax) MathJax.typesetPromise();
        }

        function login() {
            const e = document.getElementById('adm-email').value;
            const p = document.getElementById('adm-pass').value;
            auth.signInWithEmailAndPassword(e, p).catch(() => alert("身分驗證失敗"));
        }

        function logout() { if(confirm("確定登出管理端？")) auth.signOut().then(() => location.reload()); }

        auth.onAuthStateChanged(user => {
            if (user && user.uid === '5F6F4HEDhpZbYMp7liT4czX0syI3') {
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('admin-ui').style.display = 'flex';
                syncAllData();
            }
        });

        async function syncAllData() {
            document.getElementById('loading-screen').style.display = 'flex';
            try {
                // 1. 同步題庫 (支援 LaTeX 解析對照)
                const res = await fetch(SCRIPT_URL + "?token=SuHaoClassroom2026_SecureKey&action=getQuestions");
                fullQuestionBank = await res.json();

                // 2. 監控在線人數
                db.ref('presence').on('value', s => document.getElementById('kpi-online').innerText = s.numChildren());

                // 3. 監控測驗紀錄
                db.ref('exam_records').on('value', snap => {
                    processRecords(snap.val() || {});
                    // 🚀 數據載入後觸發 LaTeX 渲染
                    if (window.MathJax) MathJax.typesetPromise();
                });
            } catch (e) { console.error("同步失敗", e); }
            document.getElementById('loading-screen').style.display = 'none';
        }

        function processRecords(records) {
            const logBody = document.getElementById('log-list-body');
            const summaryBody = document.querySelector('#exam-summary-table tbody');
            logBody.innerHTML = ""; summaryBody.innerHTML = "";

            let examMap = {}; let logRows = []; let totalScore = 0; let count = 0;

            Object.keys(records).forEach(uid => {
                const userExams = records[uid];
                Object.keys(userExams).forEach(eid => {
                    const d = userExams[eid];
                    count++; totalScore += d.score;
                    logRows.push({ ...d, uid: uid, eid: eid });

                    if(!examMap[eid]) examMap[eid] = { name: d.examName||eid, count:0, sum:0, qs:{} };
                    examMap[eid].count++; examMap[eid].sum += d.score;
                    if(d.details) d.details.forEach((q, i) => {
                        if(!examMap[eid].qs[i+1]) examMap[eid].qs[i+1] = 0;
                        if(!q.isCorrect) examMap[eid].qs[i+1]++;
                    });
                });
            });

            document.getElementById('kpi-count').innerText = count;
            document.getElementById('kpi-avg').innerText = count > 0 ? Math.round(totalScore/count) : 0;

            Object.keys(examMap).forEach(eid => {
                const m = examMap[eid];
                const worst = Object.entries(m.qs).sort((a,b)=>b[1]-a[1]).slice(0,3).map(i => `第${i[0]}題(${i[1]}人錯)`).join('、');
                summaryBody.innerHTML += `<tr><td>${eid}</td><td>${m.name}</td><td>${m.count}</td><td>${Math.round(m.sum/m.count)}</td><td style="color:#b03a2e">${worst||'無'}</td></tr>`;
            });

            logRows.sort((a,b)=>b.finishTime - a.finishTime).forEach(row => {
                db.ref(`login_stats/${row.uid}`).once('value').then(s => {
                    const stats = s.val() || {};
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="color:#999; font-size:11px;">${new Date(row.finishTime).toLocaleString()}</td>
                        <td><div style="font-weight:700;">${row.userName}</div><div style="font-size:11px; color:#aaa;">${row.studentEmail||''}</div></td>
                        <td style="font-family:monospace; font-size:11px;">${row.ip || '---'}</td>
                        <td><span class="tag">${stats.totalCount || 0} 日</span> <span class="tag">${stats.realTotalCount || 0} 總</span></td>
                        <td style="font-weight:700; color:${row.score<60?'#b03a2e':'#333'}">${row.score}</td>
                        <td><button class="back-btn" onclick='inspectPaper(${JSON.stringify(row)})'>深度審查</button></td>
                    `;
                    logBody.appendChild(tr);
                });
            });
        }

        function inspectPaper(row) {
            showSection('detail-view');
            const container = document.getElementById('paper-container');
            document.getElementById('detail-title').innerText = `${row.userName} - ${row.examName} (${row.score}分)`;
            container.innerHTML = "";

            if(row.details) {
                row.details.forEach((d, i) => {
                    const qInBank = fullQuestionBank.find(q => q.question === d.originalQuestion);
                    const explanation = qInBank ? qInBank.exp : "查無此題解析，請確認試卷編號與題庫連動。";

                    container.innerHTML += `
                        <div class="paper-item">
                            <div class="q-text">${i+1}. ${d.originalQuestion}</div>
                            <div class="ans-row ${d.isCorrect ? 'ans-correct' : 'ans-wrong'}">學生選擇：${d.userPick}</div>
                            ${!d.isCorrect ? `<div class="ans-row ans-correct">正確答案：${d.correctAnswer}</div>` : ''}
                            <div class="exp-box"><strong>解析與引導：</strong><br>${explanation}</div>
                        </div>
                    `;
                });
                // 🚀 彈窗渲染後強制再次觸發 LaTeX 渲染
                if (window.MathJax) MathJax.typesetPromise();
            }
        }
    </script>
</body>
</html>
