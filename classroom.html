<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <link rel="icon" href="https://suuuuuhaooooo.github.io/-/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="https://suuuuuhaooooo.github.io/-/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蘇昊數理｜專業數位雲端教室</title>
    
    <meta name="description" content="整合專屬教材、影音解題與課程資料庫。為學生打造不受時空限制的數位學習環境。">
    <meta property="og:title" content="蘇昊數理｜專業數位雲端教室">
    <meta property="og:description" content="整合課後講義、客製化題庫與影音解題，讓學習與複習更有效率。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://suuuuuhaooooo.github.io/-/classroom.html">
    <meta property="og:image" content="https://suuuuuhaooooo.github.io/-/og-image.png">

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        :root { --primary: #8e9775; --dark: #5b6348; --bg: #f8f8f6; --white: #ffffff; }
        
        body { 
            font-family: "Noto Serif TC", serif; 
            background-color: var(--bg); 
            margin: 0; 
            color: #333; 
            height: 100vh; 
            overflow: hidden; 
            user-select: none; 
            -webkit-user-select: none;
        }
        
        /* 登入介面 */
        #login-ui { display: flex; justify-content: center; align-items: center; height: 100vh; background: var(--bg); position: fixed; width: 100%; z-index: 1000; }
        .login-card { background: white; padding: 40px; border-radius: 4px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); width: 340px; text-align: center; border-top: 6px solid var(--primary); }
        .input-group { position: relative; margin: 10px 0; }
        input { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid #eee; 
            background: #fafafa; 
            box-sizing: border-box; 
            outline: none; 
            transition: 0.3s; 
            user-select: auto;
            -webkit-user-select: auto;
        }
        input:focus { border-color: var(--primary); background: #fff; }
        .toggle-password { position: absolute; right: 15px; top: 14px; cursor: pointer; color: #ccc; font-size: 14px; }

        .captcha-container { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
        #captcha-canvas { background: #eef1ec; cursor: pointer; border-radius: 2px; flex: 1; height: 45px; }

        .main-btn { background: var(--primary); color: white; border: none; padding: 14px; width: 100%; cursor: pointer; letter-spacing: 2px; font-weight: 700; transition: 0.3s; margin-top: 10px; }
        .main-btn:hover { background: var(--dark); }

        .online-counter { font-size: 12px; color: #999; margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .online-dot { width: 8px; height: 8px; background: #27ae60; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* 教室佈局 */
        #classroom-ui { display: none; height: 100vh; width: 100%; }
        .sidebar { width: 260px; background: white; border-right: 1px solid #eee; display: flex; flex-direction: column; padding: 30px 0; }
        .sidebar-brand { padding: 0 30px 30px; border-bottom: 1px solid #f5f5f5; margin-bottom: 20px; }
        .nav-group { flex-grow: 1; }
        .nav-link { display: block; padding: 15px 30px; text-decoration: none; color: #777; font-size: 0.95em; cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; }
        .nav-link:hover { background: #f9faf9; color: var(--primary); }
        .nav-link.active { background: #f4f6f4; color: var(--primary); border-left-color: var(--primary); font-weight: 700; }
        
        .sidebar-footer { padding: 20px 30px; border-top: 1px solid #f5f5f5; line-height: 1.6; }
        .main-content { flex-grow: 1; overflow-y: auto; padding: 40px; box-sizing: border-box; }
        .view-section { display: none; max-width: 1000px; margin: 0 auto; }
        .view-section.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; margin-top: 20px; }
        .video-card { background: white; padding: 20px; cursor: pointer; border-radius: 4px; border: 1px solid #eee; transition: 0.3s; position: relative; }
        .video-card:hover { border-color: var(--primary); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .video-card::after { content: '▶ 播放'; position: absolute; right: 15px; bottom: 15px; font-size: 11px; color: var(--primary); font-weight: 700; }

        .resource-card { background: white; padding: 20px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; border-radius: 2px; border: 1px solid #eee; }
        .pdf-tag { background: #eef1ec; color: var(--primary); padding: 2px 8px; font-size: 11px; margin-right: 12px; font-weight: 700; }
        .download-btn { color: var(--primary); text-decoration: none; font-weight: 700; border: 1px solid var(--primary); padding: 8px 18px; border-radius: 2px; font-size: 13px; transition: 0.3s; }
        
        .no-data-msg { text-align: center; color: #bbb; padding: 80px 0; font-style: italic; letter-spacing: 1px; font-size: 15px; border: 1px dashed #ddd; border-radius: 4px; }
        .logout-link { font-size: 12px; color: #999; cursor: pointer; text-decoration: underline; display: block; margin-top: 10px; }
        .info-tag { font-size: 11px; color: #888; background: #f0f0f0; padding: 2px 6px; border-radius: 3px; margin-right: 4px; }

        @media (max-width: 768px) {
            #classroom-ui { flex-direction: column; overflow-y: auto; }
            .sidebar { width: 100%; height: auto; padding: 10px 0; }
            .main-content { padding: 20px; }
            .nav-link { display: inline-block; padding: 10px 20px; }
        }
    </style>
</head>
<body>

    <div id="login-ui">
        <div class="login-card">
            <h1 style="font-size: 22px; letter-spacing: 4px; margin-bottom: 10px;">雲端影音教室</h1>
            <div style="font-size: 12px; color: #aaa; margin-bottom: 30px;">專業數位教學系統</div>
            <div class="input-group">
                <input type="email" id="email" placeholder="帳號(6 碼 + @suhao.com)" autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="密碼" autocomplete="new-password">
                <span class="toggle-password" onclick="togglePassword()">🔓</span>
            </div>
            <div class="captcha-container">
                <canvas id="captcha-canvas" width="120" height="45" title="點擊更換驗證碼" onclick="drawCaptcha()"></canvas>
                <input type="text" id="captcha-input" placeholder="驗證碼">
            </div>
            <button class="main-btn" onclick="login()">登入</button>
            <p id="error-msg" style="color:#b03a2e; font-size:12px; margin-top:15px; height: 15px;"></p>
            <div class="online-counter">
                <span class="online-dot"></span>
                <span id="presence-text">雲端系統連線中</span>
            </div>
            <a href="changelog.html" target="_blank" style="font-size: 10px; color: #aaa; letter-spacing: 1px; text-decoration: none; cursor: pointer; display: block; margin-top: 5px;">版本紀錄 v3.8.18</a>
        </div>
    </div>

    <div id="classroom-ui">
        <nav class="sidebar">
            <div class="sidebar-brand">
                <div style="font-weight: 700; color: var(--primary); font-size: 20px;">蘇昊雲端教室</div>
                <div style="font-size: 11px; color: #aaa; letter-spacing: 1px;">專業數位教學系統</div>
            </div>
            <div class="nav-group">
                <a id="nav-video" class="nav-link active" onclick="showView('video-view', this)">影音課程解題</a>
                <a id="nav-pdf" class="nav-link" onclick="showView('pdf-view', this)">專屬教材下載</a>
                <div style="margin: 20px 20px 0 20px; border-top: 1px dashed #ddd; padding-top: 10px;"></div>
                <a href="add_shortcut_method.html" target="_blank" class="nav-link" style="color: #d35400; font-weight: 700;">
                    手機桌面捷徑教學
                </a>
            </div>
            <div class="sidebar-footer">
                <div id="student-name" style="font-size: 15px; font-weight: 700; color: var(--dark);">資料同步中...</div>
                <div id="student-meta" style="margin-top: 5px;"></div>
    
                <div style="margin-top: 15px; display: flex; justify-content: space-between; align-items: flex-end;">
                <div>
                <div id="login-ip" style="font-size: 10px; color: #bbb;">IP: 獲取中...</div>
                <span class="logout-link" style="color: #b03a2e; text-decoration: none; font-weight: 700; margin-top: 8px; display: inline-block; transition: 0.2s;" onclick="logout()">登出</span>
                </div>
                <div style="font-size: 11px; color: #ccc; font-family: monospace; letter-spacing: 1px;">v3.8.20</div>
                </div>
        </div>
        </nav>

        <main class="main-content">
            <section id="video-view" class="view-section active">
                <h2 style="font-size: 20px; margin-bottom: 5px; border-left: 5px solid var(--primary); padding-left: 15px;">解題中心</h2>
                <p style="font-size: 13px; color: #888; margin-bottom: 25px; padding-left: 20px;">點擊按鈕後，系統將另開分頁。屆時請以 Google 帳號支援授權。</p>
                <div id="video-container"></div>
            </section>
            <section id="pdf-view" class="view-section">
                <h2 style="font-size: 20px; margin-bottom: 25px; border-left: 5px solid var(--primary); padding-left: 15px;">教材資源</h2>
                <p style="font-size: 13px; color: #888; margin-bottom: 25px; padding-left: 20px;">點擊按鈕後，系統將另開分頁。屆時請以 Google 帳號支援授權。</p>
                <div id="pdf-container"></div>
            </section>
        </main>
    </div>

    <script>
        document.addEventListener('contextmenu', function(event) {
            event.preventDefault();
            alert("版權所有，翻印必究！");
        });
        
        const firebaseConfig = {
            apiKey: "AIzaSyALkTnkYY3JZLCTyajahpi4IZKmFX9USdw",
            authDomain: "su-hao-classroom.firebaseapp.com",
            projectId: "su-hao-classroom",
            storageBucket: "su-hao-classroom.firebasestorage.app",
            messagingSenderId: "764168135846",
            appId: "1:764168135846:web:f2923a5f4952fa1ca64067",
            databaseURL: "https://su-hao-classroom-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx884HoE5YwEpoWwKR3aIIvAUGrydmwRFC7ETpW_UowiSsIoMch9esQye_7WjRQrNQelQ/exec";

        // 在線人數統計
        db.ref('presence').on('value', snap => {
            const count = snap.numChildren() || 0;
            const textEl = document.getElementById('presence-text');
            textEl.innerHTML = count > 1 ? `目前有 <span style="font-weight:700; color:#666;">${count}</span> 位同學正在線上` : `目前有 <span style="font-weight:700; color:#666;">1</span> 位同學在線上`;
        });

        // 3 分鐘閒置機制
        let idleTimer;
        function resetIdleTimer() {
            clearTimeout(idleTimer);
            if (auth.currentUser) {
                idleTimer = setTimeout(() => { 
                    alert("由於您已長時間未操作，系統已自動將您安全登出。"); 
                    logout(); 
                }, 180000); 
            }
        }
        window.onmousemove = window.onkeypress = window.ontouchstart = window.onclick = resetIdleTimer;

        // 圖形驗證碼邏輯
        let currentCaptcha = "";
        function drawCaptcha() {
            const canvas = document.getElementById('captcha-canvas');
            const ctx = canvas.getContext('2d');
            const chars = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjklmnpqrstuvwxyz23456789";
            
            const r = Math.floor(Math.random() * 75 + 180);
            const g = Math.floor(Math.random() * 75 + 180);
            const b = Math.floor(Math.random() * 75 + 180);
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            let code = "";
            for (let i = 0; i < 4; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            currentCaptcha = code;

            ctx.lineWidth = 0.5;
            for (let i = 0; i < canvas.width; i += 10) {
                ctx.strokeStyle = `rgba(0,0,0,${Math.random() * 0.15})`;
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for (let i = 0; i < canvas.height; i += 10) {
                ctx.strokeStyle = `rgba(0,0,0,${Math.random() * 0.15})`;
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            for (let i = 0; i < 780; i++) {
                ctx.fillStyle = `rgba(${Math.random()*255},${Math.random()*255},${Math.random()*255}, ${Math.random()*0.5})`;
                ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 1, 1);
            }

            for (let i = 0; i < 20; i++) {
                ctx.strokeStyle = `rgba(${Math.random()*255},${Math.random()*255},${Math.random()*255}, 0.6)`;
                ctx.lineWidth = Math.random() * 1.5;
                ctx.beginPath();
                ctx.moveTo(0, Math.random() * canvas.height);
                ctx.bezierCurveTo(
                    canvas.width / 3, Math.random() * canvas.height,
                    (canvas.width / 3) * 2, Math.random() * canvas.height,
                    canvas.width, Math.random() * canvas.height
                );
                ctx.stroke();
            }

            for (let i = 0; i < code.length; i++) {
                const fontSize = Math.floor(Math.random() * 15) + 22; 
                ctx.font = `italic bold ${fontSize}px 'Courier New', Courier, monospace`;
                
                ctx.save();
                const x = 20 + i * 25 + (Math.random() - 0.5) * 8;
                const y = 35 + (Math.random() - 0.5) * 10;
                
                ctx.translate(x, y);
                ctx.rotate((Math.random() - 0.5) * 0.8); 
                
                ctx.fillStyle = `rgba(${Math.random()*120},${Math.random()*120},${Math.random()*120}, 1)`;
                ctx.shadowBlur = Math.random() * 6;
                ctx.shadowColor = "rgba(0,0,0,0.4)";
                
                ctx.fillText(code[i], 0, 0);
                ctx.restore();
            }
        }

        function runLoginAnalysis(uid, noticeText, studentName) {
            return new Promise((resolve) => {
                const now = new Date();
                const today = now.toLocaleDateString('zh-TW'); 
                const userStatsRef = db.ref(`login_stats/${uid}`);
                
                userStatsRef.once('value').then(snap => {
                    let data = snap.val() || { totalCount: 0, lastLoginDate: "", firstLoginTime: "" };
                    let needsUpdate = false;

                    if (!data.firstLoginTime) {
                        const timeStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
                        data.firstLoginTime = timeStr;
                        needsUpdate = true;
                    }

                    if (data.lastLoginDate !== today) {
                        data.totalCount = (data.totalCount || 0) + 1;
                        data.lastLoginDate = today;
                        needsUpdate = true;
                    }

                    if (needsUpdate) userStatsRef.set(data);

                    alert(`${studentName} 您好：\n這是您第 ${data.totalCount} 次登入（每天計算一次）\n\n您首次登入時間為：${data.firstLoginTime}`);
                    
                    alert("★☆因系統伺服器進行維修與優化作業，為確保系統運作穩定，目前下午3~6點間為尖峰時間。若遇到觀看較不順情形，請同學多利用離峰時間觀看！☆★");

                    if (noticeText && noticeText.trim() !== "") {
                        alert("【公告】\n" + noticeText.trim());
                    }
                    resolve();
                });
            });
        }

        function togglePassword() {
            const pwd = document.getElementById('password');
            const icon = document.querySelector('.toggle-password');
            pwd.type = (pwd.type === "password") ? "text" : "password";
            icon.innerText = (pwd.type === "password") ? "🔓" : "🔒";
        }

        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const captchaInput = document.getElementById('captcha-input').value;
            
            if (captchaInput !== currentCaptcha) { 
                alert("驗證碼錯誤（請注意大小寫需完全一致）"); 
                drawCaptcha();
                return; 
            }
            
            auth.signInWithEmailAndPassword(email, password).then(cred => {
                const sid = Math.random().toString(36).substring(2);
                localStorage.setItem('session_id', sid);
                
                db.ref('auth_status/' + cred.user.uid).set({
                    current_sid: sid,
                    kick_all: false
                });
            }).catch(() => { 
                alert("帳號或密碼驗證失敗"); 
                drawCaptcha(); 
            });
        }

        function logout() { 
            const user = auth.currentUser;
            if(user) { 

                db.ref('presence/' + user.uid).remove(); 
            }
            auth.signOut().then(() => { 
                localStorage.clear(); 
                location.reload(); 
            });
        }

        window.onload = function() {
            drawCaptcha();
            fetch('https://api.ipify.org?format=json').then(res => res.json()).then(data => { 
                document.getElementById('login-ip').innerText = "IP: " + data.ip; 
            });
        };

        function showView(viewId, navEl) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            if(navEl) navEl.classList.add('active');
        }
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const authStatusRef = db.ref('auth_status/' + user.uid);

                authStatusRef.on('value', snap => {
                    const data = snap.val();
                    if (!data) return;

                    const currentLocalSid = localStorage.getItem('session_id');
                    if (!currentLocalSid) return;


                    if (data.current_sid && data.current_sid !== currentLocalSid && data.kick_all === false) {

                        authStatusRef.update({ kick_all: true });
                        return; 
                    }


                    if (data.kick_all === true) {

                        authStatusRef.off();
                        alert("系統偵測到帳號在其他裝置重複登入！\n為維護帳號安全，系統將自動登出。");
                        logout(); 
                    }
                });

                // 在線狀態監控
                const presenceRef = db.ref('presence/' + user.uid);
                db.ref('.info/connected').on('value', snap => { 
                    if (snap.val()) { presenceRef.onDisconnect().remove(); presenceRef.set(true); } 
                });

                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('classroom-ui').style.display = 'flex';
                resetIdleTimer();
                
                try {
                    const r = await fetch(SCRIPT_URL);
                    const data = await r.json();
                    const my = data.find(i => i.uid === user.uid);
                    
                    if (my) {
                        document.getElementById('student-name').innerText = my.name + " 同學";
                        document.getElementById('student-meta').innerHTML = `<span class="info-tag">${my.level} 年級</span><span class="info-tag">${my.subject}</span>`;
                        
                        if (!sessionStorage.getItem('hasSeenPopups')) {
                            await runLoginAnalysis(user.uid, my.notice, my.name);
                            sessionStorage.setItem('hasSeenPopups', 'true');
                        }

                        // 渲染影片與教材
                        const vIds = my.vIds ? my.vIds.toString().split(',').filter(id => id.trim() !== "") : [];
                        const videoBox = document.getElementById('video-container');
                        if (vIds.length > 0) {
                            const vNames = my.vNames ? my.vNames.toString().split(',') : [];
                            videoBox.innerHTML = `<div id="video-grid" class="video-grid"></div>`;
                            document.getElementById('video-grid').innerHTML = vIds.map((id, i) => `
                                <div class="video-card" onclick="window.open('https://drive.google.com/file/d/${id.trim()}/view', '_blank')">
                                    <div style="color: var(--primary); font-weight: 700; font-size: 15px; margin-bottom: 5px;">${(vNames[i] || '單元 '+(i+1)).trim()}</div>
                                    <div style="font-size: 12px; color: #999;">點擊另開分頁播放影片</div>
                                </div>`).join('');
                        } else {
                            videoBox.innerHTML = '<div class="no-data-msg">目前暫無影音內容。</div>';
                        }

                        const dLinks = my.docLinks ? my.docLinks.toString().split(',').filter(url => url.trim() !== "") : [];
                        const pdfBox = document.getElementById('pdf-container');
                        if (dLinks.length > 0) {
                            const dNames = my.docNames ? my.docNames.toString().split(',') : [];
                            pdfBox.innerHTML = dLinks.map((url, i) => `
                                <div class="resource-card">
                                    <div><span class="pdf-tag">PDF</span> ${(dNames[i] || '講義 '+(i+1)).trim()}</div>
                                    <a href="${url.trim()}" target="_blank" class="download-btn">開啟教材</a>
                                </div>`).join('');
                        } else {
                            pdfBox.innerHTML = '<div class="no-data-msg">目前暫無教材。</div>';
                        }
                    }
                } catch (e) { console.error(e); }
            } else {
                document.getElementById('login-ui').style.display = 'flex';
                document.getElementById('classroom-ui').style.display = 'none';
            }
        });
    </script>
</body>
</html>
