    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        :root { --primary: #8e9775; --dark: #5b6348; --bg: #f8f8f6; --white: #ffffff; }
        
        body { 
            font-family: "Noto Serif TC", serif; 
            background-color: var(--bg); 
            margin: 0; 
            color: #333; 
            height: 100vh; 
            overflow: hidden; 
            user-select: none; 
            -webkit-user-select: none;
        }
        
        /* 統一動畫 UI 樣式 */
        #loading-screen { 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: var(--bg);
            position: fixed; 
            width: 100%; 
            z-index: 9999; 
            top: 0; 
            left: 0;
        }

        .loading-dots { display: flex; gap: 8px; margin-bottom: 15px; }
        .loading-dots div { width: 10px; height: 10px; background-color: var(--primary); border-radius: 50%; animation: bounce 0.5s infinite alternate; }
        .loading-dots div:nth-child(2) { animation-delay: 0.15s; }
        .loading-dots div:nth-child(3) { animation-delay: 0.3s; }
        @keyframes bounce { from { transform: translateY(0); opacity: 0.6; } to { transform: translateY(-10px); opacity: 1; } }
        
        .loading-text { font-size: 14px; color: var(--dark); font-weight: 700; letter-spacing: 2px; animation: pulse-text 1.5s infinite ease-in-out; }
        @keyframes pulse-text { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

        /* 登入介面 */
        #login-ui { display: flex; justify-content: center; align-items: center; height: 100vh; height: 100dvh; background: var(--bg); position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; }
        .login-card { background: white; padding: 40px; border-radius: 4px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); width: 340px; text-align: center; border-top: 6px solid var(--primary); }
        .input-group { position: relative; margin: 10px 0; }
        input { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid #eee; 
            background: #fafafa; 
            box-sizing: border-box; 
            outline: none; 
            transition: 0.3s; 
            user-select: auto;
            -webkit-user-select: auto;
        }
        input:focus { border-color: var(--primary); background: #fff; }
        .toggle-password { position: absolute; right: 15px; top: 14px; cursor: pointer; color: #ccc; font-size: 14px; }

        .captcha-container { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
        #captcha-canvas { background: #eef1ec; cursor: pointer; border-radius: 2px; flex: 1; height: 45px; }

        .main-btn { background: var(--primary); color: white; border: none; padding: 14px; width: 100%; cursor: pointer; letter-spacing: 2px; font-weight: 700; transition: 0.3s; margin-top: 10px; }
        .main-btn:hover { background: var(--dark); }

        .online-counter { font-size: 12px; color: #999; margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .online-dot { width: 8px; height: 8px; background: #27ae60; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* 教室佈局 */
        #classroom-ui { display: none; height: 100vh; width: 100%; }
        .sidebar { width: 260px; background: white; border-right: 1px solid #eee; display: flex; flex-direction: column; padding: 30px 0; }
        .sidebar-brand { padding: 0 30px 30px; border-bottom: 1px solid #f5f5f5; margin-bottom: 20px; }
        
        /* 漢堡按鈕與選單包裝容器 (PC版隱藏按鈕，顯示容器) */
        .mobile-toggle { display: none; font-size: 26px; color: var(--primary); cursor: pointer; padding: 0 5px; user-select: none; }
        .sidebar-menu-wrapper { display: flex; flex-direction: column; flex-grow: 1; }

        .nav-group { flex-grow: 1; }
        .nav-link { display: block; padding: 15px 30px; text-decoration: none; color: #777; font-size: 0.95em; cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; }
        .nav-link:hover { background: #f9faf9; color: var(--primary); }
        .nav-link.active { background: #f4f6f4; color: var(--primary); border-left-color: var(--primary); font-weight: 700; }
        
        .sidebar-footer { padding: 20px 30px; border-top: 1px solid #f5f5f5; line-height: 1.6; }
        .main-content { flex-grow: 1; overflow-y: auto; padding: 40px; box-sizing: border-box; }
        .view-section { display: none; max-width: 1000px; margin: 0 auto; }
        .view-section.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; margin-top: 20px; }
        .video-card { background: white; padding: 20px; cursor: pointer; border-radius: 4px; border: 1px solid #eee; transition: 0.3s; position: relative; }
        .video-card:hover { border-color: var(--primary); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .video-card::after { content: '▶ 播放'; position: absolute; right: 15px; bottom: 15px; font-size: 11px; color: var(--primary); font-weight: 700; }

        .resource-card { background: white; padding: 20px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; border-radius: 2px; border: 1px solid #eee; }
        .pdf-tag { background: #eef1ec; color: var(--primary); padding: 2px 8px; font-size: 11px; margin-right: 12px; font-weight: 700; }
        .download-btn { color: var(--primary); text-decoration: none; font-weight: 700; border: 1px solid var(--primary); padding: 8px 18px; border-radius: 2px; font-size: 13px; transition: 0.3s; }
        
        .no-data-msg { text-align: center; color: #bbb; padding: 80px 0; font-style: italic; letter-spacing: 1px; font-size: 15px; border: 1px dashed #ddd; border-radius: 4px; }
        .logout-link { margin-top: 0 !important; font-size: 12px; font-weight: bold; text-decoration: none; cursor: pointer; }
        .info-tag { font-size: 11px; color: #888; background: #f0f0f0; padding: 2px 6px; border-radius: 3px; margin-right: 4px; }

        /* =========================================
           手機端專屬 App 級介面優化 (RWD) 
           ========================================= */
        @media (max-width: 768px) {
            body { height: auto; overflow: visible; }
            #classroom-ui { flex-direction: column; height: auto; }
            
            /* 登入卡片寬度優化 */
            .login-card { width: 85%; padding: 30px 20px; box-sizing: border-box; transform: translateY(-6vh); }

            /* 導覽列改為頂部固定 */
            .sidebar { width: 100%; padding: 0; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.04); border-right: none; height: auto; background: white; }
            
            /* Logo與漢堡按鈕對齊 */
            .sidebar-brand { padding: 15px 20px; margin-bottom: 0; border-bottom: none; display: flex; justify-content: space-between; align-items: center; }
            .mobile-toggle { display: block; }
            
            /* 下拉選單隱藏與顯示邏輯 */
            .sidebar-menu-wrapper { 
                display: none; 
                position: absolute; 
                top: 100%; left: 0; width: 100%; 
                background: white; 
                box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
                border-top: 1px solid #eee; 
            }
            .sidebar.open .sidebar-menu-wrapper { display: flex; }

            /* 選單項目改為直排 */
            .nav-group { display: block; padding: 0; border-bottom: 1px solid #eee; }
            .nav-link { display: block; padding: 15px 20px; font-size: 15px; border-left: none; border-bottom: 1px solid #f9f9f9; }

            /* 底部資訊緊湊排版 */
            .sidebar-footer { padding: 15px 20px; background: #fafafa; border-bottom: 1px solid #e0e0e0; border-top: none; }
            .sidebar-footer > div:nth-child(1), .sidebar-footer > div:nth-child(2) { display: inline-block; vertical-align: middle; }
            #student-name { font-size: 14px !important; margin-right: 8px; }
            #student-meta { margin-top: 0 !important; }
            .info-tag { font-size: 10px; padding: 2px 5px; }
            
            .sidebar-footer > div:nth-child(3) { 
                margin-top: 12px !important; 
                padding-top: 12px !important; 
                display: flex; 
                flex-wrap: wrap; 
                justify-content: space-between; 
                align-items: center; 
            }
            .sidebar-footer > div:nth-child(3) > div:nth-child(1) { margin-bottom: 5px !important; } 
            .sidebar-footer > div:nth-child(3) > div:nth-child(2) { margin-bottom: 5px !important; gap: 10px; }
            #login-ip { width: 100%; margin-top: 4px; }

            /* 主要內容區塊 */
            .main-content { padding: 20px 15px; }
            .video-grid { grid-template-columns: 1fr; gap: 12px; }
            .resource-card { flex-direction: column; align-items: flex-start; gap: 12px; }
            .resource-card .download-btn { align-self: flex-end; }
        }
    </style>
</head>

    <script>
        // 控制手機版漢堡選單開關
        function toggleMobileMenu() {
            document.querySelector('.sidebar').classList.toggle('open');
        }

        // -----------------------------------------
        // 反開發者工具
        // -----------------------------------------
        document.addEventListener('keydown', function(event) {
            if (event.keyCode === 123 || 
               (event.ctrlKey && event.shiftKey && (event.keyCode === 73 || event.keyCode === 74)) || 
               (event.ctrlKey && event.keyCode === 85)) { 
                event.preventDefault();
                alert("【警告】\n\n嚴禁開啟開發者工具！系統已記錄異常行為。");
                if (typeof logout === 'function') logout(); 
            }
        });
        setInterval(function() {
            const before = new Date().getTime();
            debugger; 
            const after = new Date().getTime();
            if (after - before > 100) {
                if (typeof logout === 'function') logout(); 
            }
        }, 1000);
        document.addEventListener('contextmenu', function(event) {
            event.preventDefault();
            alert("版權所有，翻印必究！");
        });
        
        const firebaseConfig = {
            apiKey: "AIzaSyALkTnkYY3JZLCTyajahpi4IZKmFX9USdw",
            authDomain: "su-hao-classroom.firebaseapp.com",
            projectId: "su-hao-classroom",
            storageBucket: "su-hao-classroom.firebasestorage.app",
            messagingSenderId: "764168135846",
            appId: "1:764168135846:web:f2923a5f4952fa1ca64067",
            databaseURL: "https://su-hao-classroom-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwxFfufe0b7eJpDxSmLgnbVvlq1itLvoD6ZCpvDJKtJg7ChcWn7lpf9LgZqQ4ZsThJiXQ/exec";

        // 在線人數統計 (全域同步)
        db.ref('presence').on('value', snap => {
            const count = snap.numChildren() || 0;
            const displayCount = count > 0 ? count : 1; 
            const textStr = `目前有 <span style="font-weight:700; color:#666;">${displayCount}</span> 位同學在線`;
            
            const loginTextEl = document.getElementById('presence-text');
            if (loginTextEl) loginTextEl.innerHTML = textStr;

            const classTextEl = document.getElementById('classroom-presence');
            if (classTextEl) classTextEl.innerHTML = textStr;
        });

        // 閒置機制
        let idleTimer;
        function resetIdleTimer() {
            clearTimeout(idleTimer);
            if (auth.currentUser) {
                idleTimer = setTimeout(() => { 
                    alert("由於您已長時間未操作，系統已自動將您安全登出。"); 
                    logout(); 
                }, 180000); 
            }
        }
        window.onmousemove = window.onkeypress = window.ontouchstart = window.onclick = resetIdleTimer;

        // 圖形驗證碼邏輯
        let currentCaptcha = "";
        function drawCaptcha() {
            const canvas = document.getElementById('captcha-canvas');
            const ctx = canvas.getContext('2d');
            const chars = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjklmnpqrstuvwxyz23456789";
            
            // 隨機背景色
            const r = Math.floor(Math.random() * 50 + 200);
            const g = Math.floor(Math.random() * 50 + 200);
            const b = Math.floor(Math.random() * 50 + 200);
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            let code = "";
            for (let i = 0; i < 4; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            currentCaptcha = code;

            // 1. 畫底層背景雜訊
            for (let i = 0; i < 500; i++) {
                ctx.fillStyle = `rgba(${Math.random()*255},${Math.random()*255},${Math.random()*255}, ${Math.random()*0.5})`;
                ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 1.5, 1.5);
            }

            // 多種字體隨機抽換
            const fontFamilies = ['Courier New', 'Georgia', 'Arial', 'Impact', 'Times New Roman', 'Verdana'];

            // 字元沾黏
            let currentX = 15 + Math.random() * 10; 

            for (let i = 0; i < code.length; i++) {
                const fontFamily = fontFamilies[Math.floor(Math.random() * fontFamilies.length)];
                
                // 字體稍微縮小一點點 (26~35px)，確保變形後不會被切掉
                const fontSize = Math.floor(Math.random() * 10) + 26; 
                ctx.font = `italic bold ${fontSize}px ${fontFamily}`;
                
                ctx.save();
                
                // 改用固定區間分配 X 座標，確保最後一個字不會跑出去 (120px 畫布，每個字大約分 24px)
                const x = 12 + i * 24 + (Math.random() - 0.5) * 6;
                // 限制 Y 軸跳動範圍，避免撞到天花板或地板
                const y = 32 + (Math.random() - 0.5) * 8; 
                ctx.translate(x, y);
                
                // 旋轉角度稍微收斂，防止字尾被切掉
                ctx.rotate((Math.random() - 0.5) * 1.0); 
                
                // 變形與扭曲 (Scale & Skew)
                const scaleX = 0.7 + Math.random() * 0.4;
                const scaleY = 0.7 + Math.random() * 0.4;
                ctx.scale(scaleX, scaleY);
                const skewX = (Math.random() - 0.5) * 0.6;
                const skewY = (Math.random() - 0.5) * 0.6;
                ctx.transform(1, skewY, skewX, 1, 0, 0);
                
                // 產生隨機深色
                const colorR = Math.floor(Math.random() * 120);
                const colorG = Math.floor(Math.random() * 120);
                const colorB = Math.floor(Math.random() * 120);
                
                // 實心字與空心框線字隨機交錯
                if (Math.random() > 0.4) {
                    ctx.fillStyle = `rgba(${colorR},${colorG},${colorB}, 0.9)`;
                    ctx.fillText(code[i], 0, 0);
                } else {
                    // 線條調細一點免得糊在一起
                    ctx.lineWidth = Math.random() * 1.5 + 0.5; 
                    ctx.strokeStyle = `rgba(${colorR},${colorG},${colorB}, 0.9)`;
                    ctx.strokeText(code[i], 0, 0);
                    ctx.fillStyle = `rgba(${Math.random()*255},${Math.random()*255},${Math.random()*255}, 0.4)`;
                    ctx.fillText(code[i], 0, 0);
                }
                
                ctx.restore();
            }

            // 前景破壞線
            for (let i = 0; i < 6; i++) {
                ctx.strokeStyle = `rgba(${Math.random()*150},${Math.random()*150},${Math.random()*150}, 0.8)`;
                ctx.lineWidth = Math.random() * 2.5 + 0.5;
                ctx.beginPath();
                ctx.moveTo(Math.random() * canvas.width * 0.2, Math.random() * canvas.height); // 從左側出發
                ctx.bezierCurveTo(
                    canvas.width / 2, Math.random() * canvas.height * 2 - canvas.height / 2, // 控制點瘋狂亂甩
                    canvas.width / 2, Math.random() * canvas.height * 2 - canvas.height / 2,
                    canvas.width * 0.8 + Math.random() * canvas.width * 0.2, Math.random() * canvas.height // 到右側結束
                );
                ctx.stroke();
            }
        }

        // 自動寄信通知函式
        function sendLoginNotify(studentName, studentEmail) {
            studentEmail = studentEmail || ""; // 避免空信箱報錯
            
            // 抓取側邊欄的 IP 文字
            const ipDisplay = document.getElementById('login-ip').innerText;
            
            // 如果還在「獲取中...」或空白，等 0.5 秒後遞迴重試，直到抓到真正的 IP
            if (ipDisplay.includes("獲取中") || ipDisplay.trim() === "IP:") {
                console.log("IP 尚未就緒，暫緩寄信...");
                setTimeout(() => sendLoginNotify(studentName, studentEmail), 500);
                return;
            }

            const currentIp = ipDisplay.replace('IP: ', '').trim();
            const user = auth.currentUser;
            
            // 如果沒抓到登入者，直接終止
            if (!user) return;

            // Firebase 查詢該學生的登入統計資料
            db.ref(`login_stats/${user.uid}`).once('value').then(snap => {
                let data = snap.val() || {};
                
                // 1. 計算「顯示次數 (每日)」
                const today = new Date().toLocaleDateString('zh-TW');
                let displayCount = data.totalCount || 0;
                
                if (data.lastLoginDate !== today) { 
                    displayCount += 1; 
                }

                // 2. 計算「真實次數 (每次)」
                let realCount = (data.realTotalCount || 0) + 1;
                

                db.ref(`login_stats/${user.uid}/realTotalCount`).set(realCount);


                const url = `${SCRIPT_URL}?token=SuHaoClassroom2026_SecureKey&action=sendLoginNotify&email=${encodeURIComponent(studentEmail)}&name=${encodeURIComponent(studentName)}&ip=${encodeURIComponent(currentIp)}&displayCount=${displayCount}&realCount=${realCount}`;
                
                // 執行 fetch 動作
                fetch(url)
                    .then(res => res.text())
                    .then(result => { console.log("GAS 紀錄結果:", result); })
                    .catch(e => { console.error("網路請求失敗:", e); });

            }).catch(e => {
                console.error("Firebase 讀取失敗，略過次數傳送", e);

                const fallbackUrl = `${SCRIPT_URL}?token=SuHaoClassroom2026_SecureKey&action=sendLoginNotify&email=${encodeURIComponent(studentEmail)}&name=${encodeURIComponent(studentName)}&ip=${encodeURIComponent(currentIp)}`;
                fetch(fallbackUrl).catch(err => console.log(err));
            });
        }

        // --- 修正後的次數統計與彈窗 ---
        function runLoginAnalysis(uid, noticeText, studentName) {
            return new Promise((resolve) => {
                let isFinished = false; // 補上狀態鎖宣告

                // 補上 3 秒保險絲宣告
                const fallbackTimer = setTimeout(() => {
                    if (isFinished) return;
                    isFinished = true;
                    document.getElementById('loading-screen').style.display = 'none';
                    alert(`${studentName} 您好：\n歡迎登入蘇昊雲端教室！\n(網路稍有延遲，已略過次數統計)`);
                    alert("★☆因系統伺服器進行維修與優化作業，目前下午 3~6 點為尖峰時間，請同學多利用離峰時間觀看！☆★");
                    if (noticeText && noticeText.trim() !== "") alert("【公告】\n" + noticeText.trim());
                    resolve();
                }, 3000);

                const now = new Date();
                const today = now.toLocaleDateString('zh-TW'); 
                const userStatsRef = db.ref(`login_stats/${uid}`);
                
                userStatsRef.once('value').then(snap => {
                    if (isFinished) return; // 若已超時則擋下
                    isFinished = true;
                    clearTimeout(fallbackTimer); // 成功則解除保險絲

                    let data = snap.val() || { totalCount: 0, lastLoginDate: "", firstLoginTime: "" };
                    let needsUpdate = false;

                    if (!data.firstLoginTime) {
                        const timeStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
                        data.firstLoginTime = timeStr;
                        needsUpdate = true;
                    }

                    if (data.lastLoginDate !== today) {
                        data.totalCount = (data.totalCount || 0) + 1;
                        data.lastLoginDate = today;
                        needsUpdate = true;
                    }

                    if (needsUpdate) userStatsRef.set(data).catch(e => console.error(e));

                    document.getElementById('loading-screen').style.display = 'none';
                    
                    alert(`${studentName} 您好：\n這是您第 ${data.totalCount} 次登入\n\n您首次登入時間為：${data.firstLoginTime}`);
                    alert("\n因系統伺服器進行維修與優化作業，\n目前下午 3~6 點為尖峰時間，\n請同學多利用離峰時間觀看！");

                    if (noticeText && noticeText.trim() !== "") {
                        alert("【公告】\n" + noticeText.trim());
                    }
                    resolve();
                    
                }).catch(e => {
                    if (isFinished) return;
                    isFinished = true;
                    clearTimeout(fallbackTimer);
                    console.error("Firebase 讀取失敗", e);
                    document.getElementById('loading-screen').style.display = 'none';
                    alert(`${studentName} 您好：\n歡迎登入雲端教室！`);
                    resolve();
                });
            });
        }
        // --- 修正完畢 ---

        function togglePassword() {
            const pwd = document.getElementById('password');
            const icon = document.querySelector('.toggle-password');
            pwd.type = (pwd.type === "password") ? "text" : "password";
            icon.innerText = (pwd.type === "password") ? "🔓" : "🔒";
        }

        async function login() {
            const now = Date.now();
            
            const safeIP = globalClientIP ? globalClientIP.replace(/[.#$\[\]:]/g, '_') : "unknown_IP";
            const ipBanRef = db.ref('ip_bans/' + safeIP);

            if (safeIP !== "unknown_IP") {
                try {
                    const snap = await ipBanRef.once('value');
                    const banData = snap.val();
                    if (banData && banData.lockUntil > now) {
                        const remainingSec = Math.ceil((banData.lockUntil - now) / 1000);
                        const min = Math.floor(remainingSec / 60);
                        const sec = remainingSec % 60;
                        alert(`【系統通知】\n因連續登入失敗多次，已被系統暫時封鎖。\n請等待 ${min} 分 ${sec} 秒後再嘗試。`);
                        return; // 直接擋下
                    }
                } catch (e) {
                    console.log("IP 檢查失敗，略過", e);
                }
            }

            // 2. 本地儲存鎖定檢查 (雙重保險)
            let lockUntil = parseInt(localStorage.getItem('login_lock_until') || '0', 10);
            let loginFailCount = parseInt(localStorage.getItem('login_fail_count') || '0', 10);
        
            if (now < lockUntil) {
                const remainingSec = Math.ceil((lockUntil - now) / 1000);
                const min = Math.floor(remainingSec / 60);
                const sec = remainingSec % 60;
                alert(`【系統通知】\n因連續登入失敗多次，請等待 ${min} 分 ${sec} 秒後再嘗試。`);
                return;
            }
        
            // 取得 DOM 元素與基礎檢查
            const emailEl = document.getElementById('email');
            const passwordEl = document.getElementById('password');
            const captchaInputEl = document.getElementById('captcha-input');
        
            const email = emailEl.value;
            const password = passwordEl.value;
            const captchaInput = captchaInputEl.value;
            
            const hasSpace = /\s/g;
        
            if (!email || email.length === 0) { alert("請輸入學員帳號"); emailEl.focus(); return; } 
            if (hasSpace.test(email)) { alert("帳號格式錯誤。"); emailEl.focus(); return; }
            if (!password || password.length === 0) { alert("請輸入密碼"); passwordEl.focus(); return; } 
            if (hasSpace.test(password)) { alert("密碼格式錯誤。"); passwordEl.focus(); return; }
            if (!captchaInput || captchaInput.length === 0) { alert("請輸入驗證碼"); captchaInputEl.focus(); return; } 
            if (hasSpace.test(captchaInput)) { alert("驗證碼格式錯誤。"); captchaInputEl.focus(); return; }
        
            if (captchaInput !== currentCaptcha) { 
                alert("驗證碼錯誤（請注意大小寫需完全一致）"); 
                drawCaptcha();
                captchaInputEl.value = ""; 
                captchaInputEl.focus();
                return; 
            }
            
            document.getElementById('loading-screen').style.display = 'flex';
            document.querySelector('#loading-screen .loading-text').innerText = "資料驗證中...";

            // 執行驗證
            auth.signInWithEmailAndPassword(email, password).then(cred => {

                localStorage.removeItem('login_fail_count');
                localStorage.removeItem('login_lock_until');
                if (safeIP !== "unknown_IP") ipBanRef.remove(); 
                
                const sid = Math.random().toString(36).substring(2);
                localStorage.setItem('session_id', sid);
                db.ref('auth_status/' + cred.user.uid).set({ current_sid: sid, kick_all: false });

            }).catch(async (error) => { 
                document.getElementById('loading-screen').style.display = 'none';
                
                loginFailCount++;
                localStorage.setItem('login_fail_count', loginFailCount);

                let penaltyMinutes = 0;
                let cloudFails = loginFailCount;

                if (safeIP !== "unknown_IP") {
                    try {
                        const snap = await ipBanRef.once('value');
                        let banData = snap.val() || { fails: 0, lockUntil: 0 };
                        banData.fails += 1;
                        cloudFails = banData.fails;
                        

                        if (banData.fails === 3) penaltyMinutes = 10;
                        else if (banData.fails === 4) penaltyMinutes = 30;
                        else if (banData.fails >= 5) penaltyMinutes = 60;
                        
                        if (penaltyMinutes > 0) {
                            banData.lockUntil = now + (penaltyMinutes * 60 * 1000); 

                        }
                        await ipBanRef.set(banData);
                    } catch(e) { console.log("更新 IP 失敗次數錯誤", e); }
                }

                // 同步本地與雲端防護次數
                if (cloudFails > loginFailCount) {
                    loginFailCount = cloudFails;
                    localStorage.setItem('login_fail_count', loginFailCount);
                }
                
                // 本地計算懲罰時間（雙重確保）
                if (penaltyMinutes === 0) {
                    if (loginFailCount === 3) penaltyMinutes = 10;
                    else if (loginFailCount === 4) penaltyMinutes = 30;
                    else if (loginFailCount >= 5) penaltyMinutes = 60;
                }

                // 顯示封鎖結果或剩餘次數警告
                if (penaltyMinutes > 0) {
                    localStorage.setItem('login_lock_until', now + (penaltyMinutes * 60 * 1000));
                    alert(`偵測到多次登入失敗！\n系統已啟動安全防護，暫停您的登入權限 ${penaltyMinutes} 分鐘。`);
                } else {
                    let attemptsLeft = 3 - loginFailCount;
                    let warnText = attemptsLeft > 0 ? `\n\n(警告：再失敗 ${attemptsLeft} 次將觸發系統鎖定)` : "";
                    switch (error.code) {
                        case 'auth/user-not-found': alert("查無此帳號，請重新確認。" + warnText); break;
                        case 'auth/wrong-password': alert("密碼輸入錯誤，請重新確認。" + warnText); break;
                        case 'auth/too-many-requests': alert("嘗試次數過多，請稍後再試。"); break;
                        default: alert("帳號或密碼驗證失敗。" + warnText);
                    }
                }
                drawCaptcha(); 
            });
        }
        
        function logout() { 
            const user = auth.currentUser;
            if(user) db.ref('presence/' + user.uid).remove();
            auth.signOut().then(() => { 
                localStorage.clear(); 
                sessionStorage.clear();
                location.reload(); 
            });
        }

        let globalClientIP = "";

        window.onload = function() {
            drawCaptcha();
            fetch('https://api.ipify.org?format=json')
                .then(res => res.json())
                .then(data => { 
                    globalClientIP = data.ip; 
                    document.getElementById('login-ip').innerText = "IP: " + data.ip; 
                })
                .catch(err => console.log("獲取 IP 失敗", err));
        };

        function showView(viewId, navEl) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            if(navEl) navEl.classList.add('active');
            
            // 手機版點擊選單後自動收起漢堡選單
            if (window.innerWidth <= 768) {
                document.querySelector('.sidebar').classList.remove('open');
            }
        }

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const authStatusRef = db.ref('auth_status/' + user.uid);
                authStatusRef.on('value', snap => {
                    const data = snap.val();
                    if (!data) return;
                    const currentLocalSid = localStorage.getItem('session_id');
                    if (data.current_sid && data.current_sid !== currentLocalSid && data.kick_all === false) {
                        authStatusRef.update({ kick_all: true }); return; 
                    }
                    if (data.kick_all === true) {
                        authStatusRef.off(); alert("偵測到重複登入，系統將自動登出。"); logout(); 
                    }
                });

                const presenceRef = db.ref('presence/' + user.uid);
                db.ref('.info/connected').on('value', snap => { 
                    if (snap.val()) { presenceRef.onDisconnect().remove(); presenceRef.set(true); } 
                });

                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('classroom-ui').style.display = 'flex';
                document.getElementById('loading-screen').style.display = 'flex'; // 進入教室時顯示同步中
                resetIdleTimer();
                
                try {
                    const r = await fetch(SCRIPT_URL + "?token=SuHaoClassroom2026_SecureKey");
                    const data = await r.json();
                    const my = data.find(i => i.uid === user.uid);
                    
                    if (my) {
                        document.getElementById('student-name').innerText = my.name + " 同學";
                        localStorage.setItem('studentName', my.name);
                        const subjectTags = my.subject ? my.subject.toString().split(/[,，]/).filter(s => s.trim() !== "").map(s => `<span class="info-tag">${s.trim()}</span>`).join('') : '';
                        document.getElementById('student-meta').innerHTML = `<span class="info-tag">${my.level} 年級</span>${subjectTags}`;
                        
                        if (!sessionStorage.getItem('hasSeenPopups')) {
                            sendLoginNotify(my.name, my.studentEmail);
                            await runLoginAnalysis(user.uid, my.notice, my.name);
                            sessionStorage.setItem('hasSeenPopups', 'true');
                        }

                        // 渲染影片
                        const vIds = my.vIds ? my.vIds.toString().split(',').filter(id => id.trim() !== "") : [];
                        const videoBox = document.getElementById('video-container');
                        if (vIds.length > 0) {
                            const vNames = my.vNames ? my.vNames.toString().split(',') : [];
                            videoBox.innerHTML = `<div id="video-grid" class="video-grid"></div>`;
                            document.getElementById('video-grid').innerHTML = vIds.map((id, i) => `
                                <div class="video-card" onclick="window.open('https://drive.google.com/file/d/${id.trim()}/view', '_blank')">
                                    <div style="color: var(--primary); font-weight: 700; font-size: 15px; margin-bottom: 5px;">${(vNames[i] || '單元 '+(i+1)).trim()}</div>
                                    <div style="font-size: 12px; color: #999;">點擊另開分頁播放影片</div>
                                </div>`).join('');
                        } else {
                            videoBox.innerHTML = '<div class="no-data-msg">目前暫無影音內容。</div>';
                        }

                        // 渲染教材
                        const dLinks = my.docLinks ? my.docLinks.toString().split(',').filter(url => url.trim() !== "") : [];
                        const pdfBox = document.getElementById('pdf-container');
                        if (dLinks.length > 0) {
                            const dNames = my.docNames ? my.docNames.toString().split(',') : [];
                            pdfBox.innerHTML = dLinks.map((url, i) => `
                                <div class="resource-card">
                                    <div><span class="pdf-tag">PDF</span> ${(dNames[i] || '講義 '+(i+1)).trim()}</div>
                                    <a href="${url.trim()}" target="_blank" class="download-btn">開啟教材</a>
                                </div>`).join('');
                        } else {
                            pdfBox.innerHTML = '<div class="no-data-msg">目前暫無教材。</div>';
                        }
                    }
                    // 資料載入完成，關閉動畫
                    document.getElementById('loading-screen').style.display = 'none';
                } catch (e) { 
                    console.error(e);
                    document.getElementById('loading-screen').style.display = 'none';
                }
            } else {
                document.getElementById('login-ui').style.display = 'flex';
                document.getElementById('classroom-ui').style.display = 'none';
                document.getElementById('loading-screen').style.display = 'none';
            }
        });
    </script>
