<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <link rel="icon" href="https://suuuuuhaooooo.github.io/-/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="https://suuuuuhaooooo.github.io/-/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蘇昊數理｜系統授權啟用</title>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        :root { --primary: #8e9775; --dark: #5b6348; --bg: #f8f8f6; --white: #ffffff; }
        
        body { 
            font-family: "Noto Serif TC", serif; 
            background-color: var(--bg); 
            margin: 0; 
            color: #333; 
            height: 100vh; 
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none; 
            -webkit-user-select: none;
        }

        .activate-card { 
            background: white; 
            padding: 40px; 
            border-radius: 8px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); 
            width: 90%; 
            max-width: 360px; 
            text-align: center; 
            border-top: 6px solid var(--primary); 
            box-sizing: border-box;
            max-height: 95vh;
            overflow-y: auto;
        }

        .activate-card h1 { font-size: 22px; letter-spacing: 4px; margin: 0 0 25px 0; color: var(--dark); }

        .input-group { position: relative; margin: 15px 0; text-align: left; }
        .input-group label { display: block; font-size: 13px; color: #444; margin-bottom: 6px; font-weight: bold; letter-spacing: 1px; }
        
        input { 
            width: 100%; 
            padding: 12px 14px; 
            border: 1px solid #ddd; 
            background: #fafafa; 
            border-radius: 4px;
            box-sizing: border-box; 
            outline: none; 
            transition: 0.3s; 
            font-size: 14px;
            letter-spacing: 1px;
        }
        input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 5px rgba(142,151,117,0.2); }
        input::placeholder { color: #bbb; font-size: 13px; letter-spacing: 0; }
        
        #activate-code { font-family: monospace; font-size: 15px; letter-spacing: 2px; }
        
        .domain-suffix {
            position: absolute;
            right: 15px;
            top: 33px;
            color: #aaa;
            font-size: 14px;
            pointer-events: none;
        }

        .main-btn { 
            background: var(--primary); color: white; border: none; padding: 15px; 
            width: 100%; cursor: pointer; letter-spacing: 2px; font-weight: 700; 
            transition: 0.3s; margin-top: 20px; border-radius: 4px; font-size: 16px;
        }
        .main-btn:hover { background: var(--dark); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(142,151,117,0.3); }

        .back-link { display: inline-block; margin-top: 20px; font-size: 13px; color: #888; text-decoration: none; transition: 0.2s; }
        .back-link:hover { color: var(--primary); }

        #loading-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.9); z-index: 9999; 
            flex-direction: column; justify-content: center; align-items: center; 
        }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .activate-card::-webkit-scrollbar { width: 4px; }
        .activate-card::-webkit-scrollbar-thumb { background-color: #ccc; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text" style="color: var(--dark); font-weight: bold; letter-spacing: 1px;">系統啟用中...</div>
    </div>

    <div class="activate-card">
        <h1>系統授權啟用</h1>

        <div class="input-group">
            <label>授權序號</label>
            <input type="text" id="activate-code" placeholder="格式：xxxx-xxxx-xxxx-xxxx" maxlength="19" autocomplete="off">
        </div>

        <div class="input-group">
            <label>設定登入帳號 (至少 8 碼)</label>
            <input type="text" id="custom-username" placeholder="需包含英文與數字" autocomplete="off" style="padding-right: 110px;">
            <span class="domain-suffix">@suhao.com</span>
        </div>

        <div class="input-group">
            <label>設定登入密碼 (至少 6 碼)</label>
            <input type="password" id="custom-password" placeholder="需含大小寫英文與數字">
        </div>

        <div class="input-group">
            <label>確認登入密碼</label>
            <input type="password" id="confirm-password" placeholder="請再次輸入相同密碼">
        </div>

        <div class="input-group">
            <label>個人備用信箱</label>
            <input type="email" id="google-email" placeholder="密碼救援使用" autocomplete="off">
        </div>

        <button class="main-btn" id="submit-btn" onclick="processActivation()">確認並啟用</button>
        
        <a href="classroom.html" class="back-link">已有帳號？返回登入頁面</a>
    </div>

    <script>
        document.getElementById('custom-username').addEventListener('input', function(e) {
            let target = e.target;

            target.value = target.value.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
        });
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', event => {
            if (event.keyCode === 123 || (event.ctrlKey && event.shiftKey && (event.keyCode === 73 || event.keyCode === 74)) || (event.ctrlKey && event.keyCode === 85)) { 
                event.preventDefault();
            }
        });

        document.getElementById('activate-code').addEventListener('input', function(e) {
            let target = e.target;
            let val = target.value.replace(/[^a-zA-Z0-9]/g, '');
            val = val.substring(0, 16);
            let formatted = val.match(/.{1,4}/g)?.join('-') || val;
            target.value = formatted;
        });

        const firebaseConfig = {
            apiKey: "AIzaSyALkTnkYY3JZLCTyajahpi4IZKmFX9USdw",
            authDomain: "su-hao-classroom.firebaseapp.com",
            projectId: "su-hao-classroom",
            storageBucket: "su-hao-classroom.firebasestorage.app",
            messagingSenderId: "764168135846",
            appId: "1:764168135846:web:f2923a5f4952fa1ca64067"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database(); 
        let globalClientIP = "";

        window.onload = function() {
            fetch('https://api.ipify.org?format=json')
                .then(res => res.json())
                .then(data => { globalClientIP = data.ip; })
                .catch(err => console.log("獲取 IP 失敗", err));
        };
        
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwxFfufe0b7eJpDxSmLgnbVvlq1itLvoD6ZCpvDJKtJg7ChcWn7lpf9LgZqQ4ZsThJiXQ/exec";

        function showLoading(text) {
            document.getElementById('loading-text').innerText = text;
            document.getElementById('loading-overlay').style.display = 'flex';
        }
        function hideLoading() {
            document.getElementById('loading-overlay').style.display = 'none';
        }

        async function processActivation() {
            const now = Date.now();
            
            const safeIP = globalClientIP ? globalClientIP.replace(/[.#$\[\]:]/g, '_') : "unknown_IP";
            const ipBanRef = db.ref('ip_bans/' + safeIP);

            if (safeIP !== "unknown_IP") {
                try {
                    const snap = await ipBanRef.once('value');
                    const banData = snap.val();
                    if (banData && banData.lockUntil > now) {
                        const remainingSec = Math.ceil((banData.lockUntil - now) / 1000);
                        const min = Math.floor(remainingSec / 60);
                        const sec = remainingSec % 60;
                        alert(`【系統通知】\n因異常嘗試過多次，已被系統暫時封鎖。\n請等待 ${min} 分 ${sec} 秒後再嘗試。`);
                        return; // 封鎖期間直接擋下
                    }
                } catch (e) { console.log("IP 檢查失敗，略過", e); }
            }

            let lockUntil = parseInt(localStorage.getItem('activate_lock_until') || '0', 10);
            let failCount = parseInt(localStorage.getItem('activate_fail_count') || '0', 10);

            if (now < lockUntil) {
                const remainingSec = Math.ceil((lockUntil - now) / 1000);
                const min = Math.floor(remainingSec / 60);
                const sec = remainingSec % 60;
                alert(`【系統通知】\n請等待 ${min} 分 ${sec} 秒後再嘗試。`);
                return;
            }

            // 取值與格式檢查
            const code = document.getElementById('activate-code').value.trim();
            const username = document.getElementById('custom-username').value.trim();
            const googleEmail = document.getElementById('google-email').value.trim();
            const pwd = document.getElementById('custom-password').value;
            const pwdConfirm = document.getElementById('confirm-password').value;

            if (!code || code.length !== 19) { alert("請輸入正確的授權序號！"); return; }
            if (!/^(?=.*[a-zA-Z])(?=.*\d)[a-zA-Z0-9]{8,}$/.test(username)) { alert("帳號格式錯誤！\n\n請設定至少 8 碼，且必須包含「英文字母」與「數字」。"); return; }
            if (!/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{6,}$/.test(pwd)) { alert("密碼格式錯誤！\n\n請設定至少 6 碼，且必須包含「大寫英文」、「小寫英文」與「數字」。"); return; }
            if (pwd !== pwdConfirm) { alert("兩次輸入的密碼不一致！"); return; }
            if (!googleEmail.toLowerCase().endsWith('@gmail.com')) { alert("備用信箱請輸入 Gmail！"); return; }

            const fullEmail = username.toLowerCase() + "@suhao.com";

            try {
                showLoading("正在驗證序號...");
                const verifyUrl = `${SCRIPT_URL}?token=SuHaoClassroom2026_SecureKey&action=verifyActivationCode&code=${encodeURIComponent(code)}`;
                const verifyRes = await fetch(verifyUrl);
                const verifyResult = await verifyRes.json();

                if (!verifyResult.success) {
                    hideLoading();
                    failCount++; // 錯誤次數 +1
                    localStorage.setItem('activate_fail_count', failCount);
                    
                    let penaltyMinutes = 0;
                    let cloudFails = failCount;

                    if (safeIP !== "unknown_IP") {
                        try {
                            const snap = await ipBanRef.once('value');
                            let banData = snap.val() || { fails: 0, lockUntil: 0 };
                            banData.fails += 1;
                            cloudFails = banData.fails;
                            
                            if (banData.fails === 3) penaltyMinutes = 10;
                            else if (banData.fails === 4) penaltyMinutes = 30;
                            else if (banData.fails >= 5) penaltyMinutes = 60; 

                            if (penaltyMinutes > 0) {
                                banData.lockUntil = now + (penaltyMinutes * 60 * 1000);
                            }
                            await ipBanRef.set(banData);
                        } catch(e) { console.log("更新 IP 失敗次數錯誤", e); }
                    }

                    if (cloudFails > failCount) {
                        failCount = cloudFails;
                        localStorage.setItem('activate_fail_count', failCount);
                    }
                    if (penaltyMinutes === 0) {
                        if (failCount === 3) penaltyMinutes = 10;
                        else if (failCount === 4) penaltyMinutes = 30;
                        else if (failCount >= 5) penaltyMinutes = 60;
                    }

                    if (penaltyMinutes > 0) {
                        localStorage.setItem('activate_lock_until', now + (penaltyMinutes * 60 * 1000));
                        alert(`【警告】\n偵測到多次無效序號！\n為保護系統安全，已暫停您的啟用權限 ${penaltyMinutes} 分鐘。`);
                    } else {
                        let attemptsLeft = 3 - failCount;
                        alert("啟用失敗：" + verifyResult.message + `\n\n(警告：再失敗 ${attemptsLeft} 次將觸發安全鎖定)`);
                    }
                    return;
                }

                localStorage.removeItem('activate_fail_count');
                localStorage.removeItem('activate_lock_until');
                if (safeIP !== "unknown_IP") ipBanRef.remove(); 

                showLoading("正在建立系統帳號...");
                const userCredential = await auth.createUserWithEmailAndPassword(fullEmail, pwd);
                const userUid = userCredential.user.uid; 

                showLoading("正在同步雲端資料庫...");
                const bindUrl = `${SCRIPT_URL}?token=SuHaoClassroom2026_SecureKey&action=bindNewAccount&code=${encodeURIComponent(code)}&email=${encodeURIComponent(fullEmail)}&googleEmail=${encodeURIComponent(googleEmail)}&pwd=${encodeURIComponent(pwd)}&uid=${encodeURIComponent(userUid)}`;
                
                const bindRes = await fetch(bindUrl);
                const bindResult = await bindRes.json();

                if (bindResult.success) {
                    await auth.signOut();
                    hideLoading();
                    alert(`您好 ${verifyResult.studentName} 同學！\n\n啟用成功！您的帳號為：\n${fullEmail}\n\n請點擊確定返回登入。`);
                    window.location.replace("classroom.html");
                } else {
                    hideLoading();
                    alert("帳號已建立，但資料同步異常，請洽管理員處理。");
                }

            } catch (error) {
                hideLoading();
                if (error.code === 'auth/email-already-in-use') {
                    alert("此帳號名稱已被佔用，請嘗試其他名稱。");
                } else {
                    alert("錯誤：" + error.message);
                }
            }
        }
    </script>
</body>
</html>
