<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蘇昊數理｜預約時段系統</title>
    
    <meta name="description" content="提供學員彈性排課與加(補)課時段預約，即時更新剩餘名額。">
    <meta property="og:title" content="蘇昊數理｜預約時段系統">
    <meta property="og:description" content="線上加課與補課預約，學員登入即可即時選課、鎖定名額，讓課後學習規劃更具彈性與效率。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://suuuuuhaooooo.github.io/-/booking.html">
    <meta property="og:image" content="https://suuuuuhaooooo.github.io/-/og-image.png">
    
    <link rel="icon" href="https://suuuuuhaooooo.github.io/-/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="https://suuuuuhaooooo.github.io/-/favicon.png">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        :root { --primary: #8e9775; --dark: #5b6348; --bg: #f8f8f6; }
        body { font-family: "Noto Serif TC", serif; background-color: var(--bg); margin: 0; user-select: none; -webkit-user-select: none; }
        
        /* 登入卡風格 (與 Classroom 完全一致) */
        #login-ui { display: flex; flex-direction: column; gap: 25px; justify-content: center; align-items: center; height: 100vh; background: var(--bg); }
        .login-card { background: white; padding: 40px; border-radius: 4px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); width: 340px; text-align: center; border-top: 6px solid var(--primary); }
        .input-group { position: relative; margin: 10px 0; }
        input { width: 100%; padding: 14px; border: 1px solid #eee; background: #fafafa; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); background: #fff; }
        .toggle-password { position: absolute; right: 15px; top: 14px; cursor: pointer; color: #ccc; font-size: 14px; }
        
        /* 驗證碼區塊 */
        .captcha-container { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
        #captcha-canvas { background: #eef1ec; cursor: pointer; border-radius: 2px; flex: 1; height: 45px; }

        .main-btn { background: var(--primary); color: white; border: none; padding: 14px; width: 100%; cursor: pointer; letter-spacing: 2px; font-weight: 700; transition: 0.3s; margin-top: 10px; }
        .main-btn:hover { background: var(--dark); }
        
        /* 加課 UI */
        #booking-ui { display: none; padding: 40px 20px; max-width: 600px; margin: 0 auto; }
        .slot-card { background: white; padding: 20px; margin: 15px 0; border-radius: 8px; border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .book-btn { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .book-btn:disabled { background: #ccc; cursor: not-allowed; }
        .countdown {
            font-size: 12px;
            color: #c0392b;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <div id="login-ui">
        <div class="login-card">
            <h1 style="font-size: 22px; letter-spacing: 4px; margin-bottom: 10px;">預約時段系統</h1>
            <div style="font-size: 12px; color: #aaa; margin-bottom: 30px;">加(補)課預約</div>
            
            <div class="input-group">
                <input type="email" id="email" placeholder="帳號" autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="密碼" autocomplete="new-password">
                <span class="toggle-password" onclick="togglePassword()">🔓</span>
            </div>
            
            <div class="captcha-container">
                <canvas id="captcha-canvas" width="120" height="45" title="點擊更換驗證碼" onclick="drawCaptcha()"></canvas>
                <input type="text" id="captcha-input" placeholder="驗證碼">
            </div>
            
            <button class="main-btn" onclick="login()" id="login-btn">登入系統</button>
            <p id="error-msg" style="color:#b03a2e; font-size:12px; margin-top:15px; height: 15px;"></p>
        </div>
    </div>

    <div id="booking-ui">
        <h2 style="text-align:center; color: var(--dark);">可預約加課時段</h2>
        <div id="slot-list">時段載入中...</div>
        <div style="text-align:center; margin-top:30px;">
            <button onclick="logout()" style="background:none; border:none; color:#888; cursor:pointer;">登出系統</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. 資安防護 (與 classroom.html 一模一樣)
        // ==========================================
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
                e.preventDefault(); alert("【警告】嚴禁開啟開發者工具！"); location.reload();
            }
        });
        setInterval(function() {
            const before = new Date().getTime();
            debugger; 
            const after = new Date().getTime();
            if (after - before > 100) { alert("偵測到異常行為，系統即將登出。"); logout(); }
        }, 1000);
        
        // ==========================================
        // 2. Firebase & GAS 設定 (請補上您的資訊)
        // ==========================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwxFfufe0b7eJpDxSmLgnbVvlq1itLvoD6ZCpvDJKtJg7ChcWn7lpf9LgZqQ4ZsThJiXQ/exec";
        const firebaseConfig = {
            apiKey: "AIzaSyALkTnkYY3JZLCTyajahpi4IZKmFX9USdw",
            authDomain: "su-hao-classroom.firebaseapp.com",
            projectId: "su-hao-classroom",
            storageBucket: "su-hao-classroom.firebasestorage.app", 
            messagingSenderId: "764168135846",
            appId: "1:764168135846:web:f2923a5f4952fa1ca64067"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        auth.setPersistence(firebase.auth.Auth.Persistence.SESSION);
        // ==========================================
        // 3. 登入與圖形驗證碼邏輯
        // ==========================================
        let currentCaptcha = "";
        function drawCaptcha() {
            const canvas = document.getElementById('captcha-canvas');
            const ctx = canvas.getContext('2d');
            const chars = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjklmnpqrstuvwxyz23456789";
            ctx.fillStyle = `rgb(${Math.random()*50+200},${Math.random()*50+200},${Math.random()*50+200})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            let code = "";
            for (let i = 0; i < 4; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
            currentCaptcha = code;
            
            ctx.font = "bold 26px Arial";
            ctx.fillStyle = "#333";
            ctx.fillText(code, 15, 32);
            for (let i = 0; i < 4; i++) {
                ctx.strokeStyle = `rgba(0,0,0,0.3)`;
                ctx.beginPath();
                ctx.moveTo(Math.random() * canvas.width, Math.random() * canvas.height);
                ctx.lineTo(Math.random() * canvas.width, Math.random() * canvas.height);
                ctx.stroke();
            }
        }

        function togglePassword() {
            const pwd = document.getElementById('password');
            const icon = document.querySelector('.toggle-password');
            pwd.type = (pwd.type === "password") ? "text" : "password";
            icon.innerText = (pwd.type === "password") ? "🔓" : "🔒";
        }

        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const captcha = document.getElementById('captcha-input').value.trim();
            const errorMsg = document.getElementById('error-msg');
            const btn = document.getElementById('login-btn');

            if (!email || !password || !captcha) { errorMsg.innerText = "請完整填寫所有欄位"; return; }
            if (captcha !== currentCaptcha) { 
                errorMsg.innerText = "驗證碼錯誤，請重新輸入"; 
                document.getElementById('captcha-input').value = '';
                drawCaptcha(); return; 
            }

            btn.disabled = true;
            btn.innerText = "身分驗證中...";
            try {
                await auth.signInWithEmailAndPassword(email, password);
                // 登入後 onAuthStateChanged 會接手
            } catch (e) {
                errorMsg.innerText = "登入失敗：帳號或密碼錯誤";
                btn.disabled = false;
                btn.innerText = "登入系統";
                drawCaptcha();
            }
        }

        function logout() { auth.signOut().then(() => location.reload()); }

        // ==========================================
        // 4. 登入後狀態判斷 (重點：去 Sheet 查身分)
        // ==========================================
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                document.getElementById('login-btn').innerText = "資料庫核對中...";
                try {
                    const res = await fetch(`${SCRIPT_URL}?token=SuHaoClassroom2026_SecureKey`);
                    const allStudents = await res.json();
                    
                    // 比對「學生資料」中的 UID
                    const myData = allStudents.find(s => s.uid === user.uid);
                    
                    if (myData) {
                        localStorage.setItem('studentName', myData.name);
                        
                        document.getElementById('login-ui').style.display = 'none';
                        document.getElementById('booking-ui').style.display = 'block';
                        loadSlots();
                    } else {
                        alert("您的帳號無法使用加課系統，請聯繫管理員！");
                        logout();
                    }
                } catch(e) {
                    alert("連線資料庫失敗，請重試");
                    logout();
                }
            } else {
                document.getElementById('login-ui').style.display = 'flex';
                document.getElementById('booking-ui').style.display = 'none';
                drawCaptcha();
            }
        });

        // ==========================================
        // 5. 選課渲染與送出邏輯
        // ==========================================
        
        async function loadSlots() {
            const now = new Date();
            const list = document.getElementById('slot-list');
        
            try {
        
                const res = await fetch(
                    `${SCRIPT_URL}?token=SuHaoClassroom2026_SecureKey&action=getSlots`
                );
        
                const slots = await res.json();
        
                // 目前登入學生
                const myName = localStorage.getItem('studentName') || "";
        
                // 過濾可見時段
                const filteredSlots = slots.filter(s => {
                    // ========= 1. 時間限制 =========
                    if (s.openTime) {
                    
                        const parseTime = (t) => {
                            if (!t) return null;
                            return new Date(t.replace(/\//g, "-").replace(" ", "T"));
                        };
                    
                        const openDate = parseTime(s.openTime);
                    
                        // 提前五分鐘顯示
                        const previewTime = new Date(openDate.getTime() - 5 * 60 * 1000);
                    
                        // 五分鐘前仍不可見
                        if (now < previewTime) {
                            return false;
                        }
                    }

                    if (s.endTime) {
                        const endDate = new Date(
                            s.endTime.replace(/\//g, "-")
                                     .replace(" ", "T")
                        );
                    
                        if (now > endDate) {
                            return false;
                        }
                    }
                
                    // ========= 2. 分流限制 =========
                    if (!s.group || s.group.trim() === "") {
                        return true;
                    }
                
                    const allowList = s.group
                        .split(',')
                        .map(v => v.trim());
                
                    return allowList.includes(myName);
                });
        
                // 沒有可預約時段
                if (filteredSlots.length === 0) {
        
                    list.innerHTML = `
                        <div style='text-align:center; color:#888; padding:20px;'>
                            目前沒有開放給您的可預約時段。
                        </div>
                    `;
        
                    return;
                }
        
                // 渲染卡片
                list.innerHTML = filteredSlots.map(s => {
        
                    // 是否已預約
                    const alreadyBooked = (s.bookedList || "")
                        .split(',')
                        .map(v => v.trim())
                        .includes(myName);
                    // 是否已到真正開放時間
                    const openDate = new Date(
                        s.openTime.replace(/\//g, "-").replace(" ", "T")
                    );
                    const notOpenYet = now < openDate;
                    return `
                        <div class="slot-card">
                            <div>
                                <strong style="color:var(--primary); font-size:16px;">
                                    ${s.name}
                                </strong><br>
        
                                <small style="color:#888;">
                                    開放時間：${s.openTime}
                                </small>
                                <br>
                    
                                <small style="color:#888;">
                                    截止時間：${s.endTime}
                                </small>
                                <br>
                                ${
                                    notOpenYet
                                    ? `<div class="countdown" data-time="${s.openTime}">
                                            距離開放剩餘：計算中...
                                       </div>`
                                    : ""
                                }
                                <small style="color:#888;">
                                    剩餘名額：${s.max - s.current} / ${s.max}
                                </small>
                            </div>
                            <button
                                class="book-btn"
                                onclick='bookSlot(${JSON.stringify(s)}, this)'
                                ${s.current >= s.max || alreadyBooked ? 'disabled' : ''}
                            >
                                ${
                                    alreadyBooked
                                        ? '已預約'
                                        : (
                                            s.current >= s.max
                                                ? '已額滿'
                                                : (
                                                    notOpenYet
                                                        ? '尚未開放'
                                                        : '立即預約'
                                                )
                                        )
                                }
                            </button>
                        </div>
                    `;
                }).join('');
                startCountdown();
            } catch(e) {
        
                console.error(e);
        
                list.innerHTML = `
                    <div style='text-align:center; color:#b03a2e; padding:20px;'>
                        時段載入失敗，請重新整理頁面。
                    </div>
                `;
        
            }
        
        }
        
        // ==========================================
        // 預約課程
        // ==========================================
        
        async function bookSlot(slot, btn){
            const openDate = new Date(
                slot.openTime.replace(/\//g, "-").replace(" ", "T")
            );
        
            if (new Date() < openDate) {
                alert("尚未到開放時間，請稍後再試");
                return;
            }
        
            if (!confirm("確認要預約此時段嗎？")) {
                return;
            }
        
            btn.disabled = true;
            btn.innerText = "選課中...";
        
            const controller = new AbortController();
        
            const timeoutId = setTimeout(() => {
                controller.abort();
            }, 8000);
        
            try {
        
                const user = firebase.auth().currentUser;
        
                const url =
                    `${SCRIPT_URL}` +
                    `?token=SuHaoClassroom2026_SecureKey` +
                    `&action=bookClass` +
                    `&slotId=${slot.id}` +
                    `&uid=${user.uid}` +
                    `&name=${encodeURIComponent(localStorage.getItem('studentName'))}`;
        
                const res = await fetch(url, {
                    signal: controller.signal
                });
        
                clearTimeout(timeoutId);
        
                const data = await res.json();
        
                if (data.success) {
        
                    alert("預約成功！");
        
                    // 重新刷新列表
                    loadSlots();
                    
        
                } else {
        
                    throw new Error(data.message);
        
                }
        
            } catch(e) {
        
                console.error(e);
        
                alert(
                    "預約失敗：" +
                    (
                        e.name === 'AbortError'
                            ? "連線逾時"
                            : e.message
                    )
                );
        
                btn.disabled = false;
                btn.innerText = "立即預約";
            }
        }
        function startCountdown() {
        const items = document.querySelectorAll('.countdown');
        function update() {
            items.forEach(el => {
                const target = new Date(
                    el.dataset.time.replace(/-/g, "/")
                );
                const diff = target - new Date();
    
                if (diff <= 0) {
                    if (!el.dataset.finished) {
                        el.dataset.finished = "1";
                        loadSlots();
                    }
                    return;
                }
                const totalSeconds = Math.floor(diff / 1000);
                const minutes = Math.floor(totalSeconds / 60);
                const seconds = totalSeconds % 60;
                el.innerText =
                    `距離開放剩餘：${minutes}分 ${seconds}秒`;
            });
        }
        update();
        setInterval(update, 1000);
    }
    // ==========================================
    // 閒置自動登出
    // ========================================== 
    let idleTimer;
    function resetIdleTimer() {
        clearTimeout(idleTimer);
        idleTimer = setTimeout(() => {
            alert("閒置過久，系統已將您自動登出");
    
            logout();
    
        }, 10 * 60 * 1000); // 10分鐘
    }
    // 使用者操作時重置計時
    ["click", "mousemove", "keydown", "scroll", "touchstart"]
    .forEach(event => {
        document.addEventListener(event, resetIdleTimer);
    });
    // 啟動
    resetIdleTimer();
    </script>
</body>
</html>
