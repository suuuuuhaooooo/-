<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蘇昊數理｜加課預約中心</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        :root { --primary: #8e9775; --dark: #5b6348; --bg: #f8f8f6; }
        body { font-family: "Noto Serif TC", serif; background-color: var(--bg); margin: 0; user-select: none; -webkit-user-select: none; }
        
        /* 繼承原本的登入卡風格 */
        #login-ui { display: flex; flex-direction: column; gap: 25px; justify-content: center; align-items: center; height: 100vh; background: var(--bg); }
        .login-card { background: white; padding: 40px; border-radius: 4px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); width: 340px; text-align: center; border-top: 6px solid var(--primary); }
        input { width: 100%; padding: 14px; border: 1px solid #eee; background: #fafafa; box-sizing: border-box; margin: 10px 0; }
        .main-btn { background: var(--primary); color: white; border: none; padding: 14px; width: 100%; cursor: pointer; font-weight: 700; }
        
        /* 加課搶票 UI */
        #booking-ui { display: none; padding: 40px 20px; max-width: 600px; margin: 0 auto; }
        .slot-card { background: white; padding: 20px; margin: 15px 0; border-radius: 8px; border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .book-btn { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .book-btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="login-ui">
        <div class="login-card">
            <h1>加課預約登入</h1>
            <input type="email" id="email" placeholder="帳號">
            <input type="password" id="password" placeholder="密碼">
            <button class="main-btn" onclick="login()">登入</button>
        </div>
    </div>

    <div id="booking-ui">
        <h2 style="text-align:center; color: var(--dark);">加課預約中心</h2>
        <div id="slot-list">資料載入中...</div>
        <div style="text-align:center; margin-top:30px;">
            <button onclick="logout()" style="background:none; border:none; color:#888; cursor:pointer;">登出系統</button>
        </div>
    </div>

    <script>
        // 1. 安全防護移植
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
                e.preventDefault();
                alert("嚴禁開啟開發者工具！");
                location.reload();
            }
        });

        // 2. 初始化環境
        const SCRIPT_URL = "您的_GAS_網址"; 
        const firebaseConfig = { /* 請貼上您原本的 firebaseConfig */ };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // 3. 頁面控制
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('booking-ui').style.display = 'block';
                loadSlots();
            } else {
                document.getElementById('login-ui').style.display = 'flex';
                document.getElementById('booking-ui').style.display = 'none';
            }
        });

        // 4. 加課系統邏輯
        async function loadSlots() {
            try {
                const res = await fetch(`${SCRIPT_URL}?token=SuHaoClassroom2026_SecureKey&action=getSlots`);
                const slots = await res.json();
                const list = document.getElementById('slot-list');
                list.innerHTML = slots.map(s => `
                    <div class="slot-card">
                        <div>
                            <strong>${s.name}</strong><br>
                            <small>名額: ${s.current}/${s.max}</small>
                        </div>
                        <button class="book-btn" onclick="bookSlot('${s.id}', this)" ${s.current >= s.max ? 'disabled' : ''}>
                            ${s.current >= s.max ? '已額滿' : '立即預約'}
                        </button>
                    </div>
                `).join('');
            } catch(e) { document.getElementById('slot-list').innerText = "載入失敗，請檢查網路。"; }
        }

        async function bookSlot(slotId, btn) {
            btn.disabled = true;
            btn.innerText = "搶課中...";
            // 隨機抖動延遲，降低伺服器瞬時壓力
            await new Promise(r => setTimeout(r, Math.random() * 800));
            
            try {
                const user = firebase.auth().currentUser;
                const url = `${SCRIPT_URL}?token=SuHaoClassroom2026_SecureKey&action=bookClass&slotId=${slotId}&uid=${user.uid}&name=${localStorage.getItem('studentName')}`;
                const res = await fetch(url);
                const data = await res.json();
                
                if (data.success) {
                    alert("預約成功！系統已將時段加入您的聯絡簿。");
                    location.reload();
                } else {
                    throw new Error(data.message);
                }
            } catch(e) {
                alert("搶課失敗：" + e.message);
                btn.disabled = false;
                btn.innerText = "立即預約";
            }
        }

        function logout() { auth.signOut().then(() => location.reload()); }
        function login() { /* 請複製原本的 login() 函式與相關驗證邏輯 */ }
    </script>
</body>
</html>
